---
# Summary:
# This playbook will do:
# 1. List categories and choose two for testing
# 2. Create a VM-host affinity policy with minimal spec
# 3. Create a VM-host affinity policy with all attributes
# 4. Get a VM-host affinity policy by ext_id
# 5. List all VM-host affinity policies
# 6. List VM-host affinity policies with limit
# 7. Update a VM-host affinity policy
# 8. Check idempotency by updating with same values
# 9. Delete a VM-host affinity policy
# 10. Delete remaining policies


- name: VM Host Affinity Policies CRUD playbook
  hosts: localhost
  gather_facts: false
  module_defaults:
    group/nutanix.ncp.ntnx:
      nutanix_host: 10.103.241.190
      nutanix_username: admin
      nutanix_password: Nutanix.123
      validate_certs: false
  tasks:
    - name: Generate random name
      ansible.builtin.set_fact:
        random_name: "{{ query('community.general.random_string', numbers=false, special=false, length=12)[0] }}"

    - name: Set policy name prefix
      ansible.builtin.set_fact:
        policy_name: "{{ random_name }}_vm_host_affinity"

    - name: List all categories and choose categories for testing
      nutanix.ncp.ntnx_categories_info_v2:
      register: categories_result

    - name: Verify categories are available
      ansible.builtin.assert:
        that:
          - categories_result.response is defined
          - categories_result.response | length > 1
        fail_msg: "Need at least 2 categories for testing"
        success_msg: "Categories available for testing"

    - name: Set category variables
      ansible.builtin.set_fact:
        category_ext_id: '{{ categories_result["response"][0]["ext_id"] }}'
        category_ext_id2: '{{ categories_result["response"][1]["ext_id"] }}'
        category_ext_id3: '{{ categories_result["response"][2]["ext_id"] }}'
        category_ext_id4: '{{ categories_result["response"][3]["ext_id"] }}'

    - name: Initialize delete list
      ansible.builtin.set_fact:
        todelete: []

    ##################################################################################
    # Create operations
    ##################################################################################

    - name: Create a VM-host affinity policy with minimal spec
      nutanix.ncp.ntnx_vm_host_affinity_policy_v2:
        state: present
        name: "{{ policy_name }}_1"
        vm_categories:
          - ext_id: "{{ category_ext_id }}"
        host_categories:
          - ext_id: "{{ category_ext_id }}"
        wait: true
      register: result

    - name: Verify creation with minimal spec
      ansible.builtin.assert:
        that:
          - result.response is defined
          - result.changed == true
          - result.failed == false
          - result.response.name == "{{ policy_name }}_1"
          - result.response.vm_categories | length == 1
          - result.response.host_categories | length == 1
        fail_msg: "Create with minimal spec failed"
        success_msg: "Create with minimal spec passed"

    - name: Add to delete list
      ansible.builtin.set_fact:
        todelete: '{{ todelete + [result["response"]["ext_id"]] }}'

    ##################################################################################

    - name: Create a VM-host affinity policy with all attributes
      nutanix.ncp.ntnx_vm_host_affinity_policy_v2:
        state: present
        name: "{{ policy_name }}_2"
        description: "{{ policy_name }}_2_description"
        vm_categories:
          - ext_id: "{{ category_ext_id2 }}"
        host_categories:
          - ext_id: "{{ category_ext_id2 }}"
        wait: true
      register: result

    - name: Verify creation with all attributes
      ansible.builtin.assert:
        that:
          - result.response is defined
          - result.changed == true
          - result.failed == false
          - result.response.name == "{{ policy_name }}_2"
          - result.response.description == "{{ policy_name }}_2_description"
          - result.response.vm_categories | length == 1
          - result.response.host_categories | length == 1
        fail_msg: "Create with all attributes failed"
        success_msg: "Create with all attributes passed"

    - name: Add to delete list
      ansible.builtin.set_fact:
        todelete: '{{ todelete + [result["response"]["ext_id"]] }}'

    ##################################################################################
    # Info operations
    ##################################################################################

    - name: Get a VM-host affinity policy by ext_id
      nutanix.ncp.ntnx_vm_host_affinity_policies_info_v2:
        ext_id: "{{ todelete[0] }}"
      register: result

    - name: Verify get by ext_id
      ansible.builtin.assert:
        that:
          - result.response is defined
          - result.changed == false
          - result.failed == false
          - result.response.ext_id == "{{ todelete[0] }}"
        fail_msg: "Get by ext_id failed"
        success_msg: "Get by ext_id passed"

    ##################################################################################

    - name: List all VM-host affinity policies
      nutanix.ncp.ntnx_vm_host_affinity_policies_info_v2:
      register: result

    - name: Verify list all
      ansible.builtin.assert:
        that:
          - result.response is defined
          - result.changed == false
          - result.failed == false
          - result.response | length > 0
          - result.total_available_results is defined
          - result.total_available_results > 0
        fail_msg: "List all policies failed"
        success_msg: "List all policies passed"

    ##################################################################################

    - name: List VM-host affinity policies with limit 1
      nutanix.ncp.ntnx_vm_host_affinity_policies_info_v2:
        limit: 1
      register: result

    - name: Verify list with limit
      ansible.builtin.assert:
        that:
          - result.response is defined
          - result.changed == false
          - result.failed == false
          - result.response | length == 1
        fail_msg: "List with limit 1 failed"
        success_msg: "List with limit 1 passed"

    ##################################################################################
    # Update operations
    ##################################################################################

    - name: Update a VM-host affinity policy
      nutanix.ncp.ntnx_vm_host_affinity_policy_v2:
        state: present
        ext_id: "{{ todelete[1] }}"
        name: "{{ policy_name }}_updated"
        description: "{{ policy_name }}_updated_description"
        vm_categories:
          - ext_id: "{{ category_ext_id3 }}"
        host_categories:
          - ext_id: "{{ category_ext_id3 }}"
        wait: true
      register: result

    - name: Verify update
      ansible.builtin.assert:
        that:
          - result.response is defined
          - result.changed == true
          - result.failed == false
          - result.response.name == "{{ policy_name }}_updated"
          - result.response.description == "{{ policy_name }}_updated_description"
        fail_msg: "Update policy failed"
        success_msg: "Update policy passed"

    ##################################################################################

    - name: Check idempotency - update with same values
      nutanix.ncp.ntnx_vm_host_affinity_policy_v2:
        state: present
        ext_id: "{{ todelete[1] }}"
        name: "{{ policy_name }}_updated"
        description: "{{ policy_name }}_updated_description"
        vm_categories:
          - ext_id: "{{ category_ext_id3 }}"
        host_categories:
          - ext_id: "{{ category_ext_id3 }}"
        wait: true
      register: result

    - name: Verify idempotency
      ansible.builtin.assert:
        that:
          - result.response is defined
          - result.changed == false
          - result.failed == false
          - result.msg == "Nothing to change."
        fail_msg: "Idempotency check failed"
        success_msg: "Idempotency check passed"

    ##################################################################################
    # Delete operations
    ##################################################################################

    - name: Delete VM-host affinity policies
      nutanix.ncp.ntnx_vm_host_affinity_policy_v2:
        state: absent
        ext_id: "{{ item }}"
      register: result
      loop: "{{ todelete }}"

    - name: Verify deletion
      ansible.builtin.assert:
        that:
          - item.response is defined
          - item.changed == true
          - item.failed == false
        fail_msg: "Delete policies failed"
        success_msg: "Delete policies passed"
      loop: "{{ result.results }}"
