---
# Summary:
# This playbook will do:
# 1. Create VM anti-affinity policy
# 2. Update VM anti-affinity policy
# 3. Fetch VM anti-affinity policy by ext_id
# 4. List all VM anti-affinity policies
# 5. List all VM anti-affinity policies with filter
# 6. List all VM anti-affinity policies with limit
# 7. Delete VM anti-affinity policy

- name: VM anti-affinity policy CRUD playbook
  hosts: localhost
  gather_facts: false
  module_defaults:
    group/nutanix.ncp.ntnx:
      # nutanix_host: <pc_ip>
      # nutanix_username: <user>
      # nutanix_password: <pass>
      # validate_certs: false
  tasks:
    - name: Setting Variables
      ansible.builtin.set_fact:
        policy_name: "example_anti_affinity_policy"
        category_ext_id_1: "bbc3555a-133b-5348-9764-bfff196e84e4"
        category_ext_id_2: "e4bda88f-e5da-5eb1-a031-2c0bb00d923d"

    ################################################################################
    # Create operation
    ################################################################################

    - name: Create VM anti-affinity policy
      nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
        name: "{{ policy_name }}"
        description: "Example VM anti-affinity policy"
        categories:
          - ext_id: "{{ category_ext_id_1 }}"
        state: present
        wait: true
      register: create_result

    - name: Print create result
      ansible.builtin.debug:
        var: create_result

    - name: Set policy ext_id
      ansible.builtin.set_fact:
        policy_ext_id: "{{ create_result.ext_id }}"

    ################################################################################
    # Info operations
    ################################################################################

    - name: Fetch VM anti-affinity policy by ext_id
      nutanix.ncp.ntnx_vm_anti_affinity_policies_info_v2:
        ext_id: "{{ policy_ext_id }}"
      register: get_result

    - name: Print get result
      ansible.builtin.debug:
        var: get_result

    - name: List all VM anti-affinity policies
      nutanix.ncp.ntnx_vm_anti_affinity_policies_info_v2:
      register: list_result

    - name: Print list result
      ansible.builtin.debug:
        var: list_result

    - name: List all VM anti-affinity policies with filter
      nutanix.ncp.ntnx_vm_anti_affinity_policies_info_v2:
        filter: "name eq '{{ policy_name }}'"
      register: filter_result

    - name: Print filter result
      ansible.builtin.debug:
        var: filter_result

    - name: List all VM anti-affinity policies with limit
      nutanix.ncp.ntnx_vm_anti_affinity_policies_info_v2:
        limit: 1
      register: limit_result

    ################################################################################
    # Update operation
    ################################################################################

    - name: Update VM anti-affinity policy
      nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
        ext_id: "{{ policy_ext_id }}"
        name: "{{ policy_name }}_updated"
        description: "Updated example VM anti-affinity policy"
        categories:
          - ext_id: "{{ category_ext_id_1 }}"
          - ext_id: "{{ category_ext_id_2 }}"
        state: present
        wait: true
      register: update_result

    - name: Print update result
      ansible.builtin.debug:
        var: update_result

    ################################################################################
    # Delete operation
    ################################################################################

    - name: Delete VM anti-affinity policy
      nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
        ext_id: "{{ policy_ext_id }}"
        state: absent
      register: delete_result

    - name: Print delete result
      ansible.builtin.debug:
        var: delete_result
