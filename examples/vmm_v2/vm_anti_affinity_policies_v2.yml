---
# Summary:
# This playbook will do:
# 1. Create VM anti-affinity policy with check mode
# 2. Create VM anti-affinity policy
# 3. Update VM anti-affinity policy
# 4. Verify idempotency on update
# 5. Fetch VM anti-affinity policy by ext_id
# 6. List all VM anti-affinity policies
# 7. Delete VM anti-affinity policy with check mode
# 8. Delete VM anti-affinity policy

- name: VM anti-affinity policy CRUD playbook
  hosts: localhost
  gather_facts: false
  module_defaults:
    group/nutanix.ncp.ntnx:
      nutanix_host: <pc_ip>
      nutanix_username: <user>
      nutanix_password: <pass>
      validate_certs: false
  tasks:
    - name: Setting Variables
      ansible.builtin.set_fact:
        policy_name: "example_anti_affinity_policy"
        category_ext_id_1: "<category_ext_id_1>"
        category_ext_id_2: "<category_ext_id_2>"

    ################################################################################
    # Create operations
    ################################################################################

    - name: Create VM anti-affinity policy - check mode
      nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
        name: "{{ policy_name }}"
        description: "Example VM anti-affinity policy"
        categories:
          - ext_id: "{{ category_ext_id_1 }}"
        state: present
        wait: true
      register: result
      check_mode: true

    - name: Print check mode result
      ansible.builtin.debug:
        var: result

    - name: Create VM anti-affinity policy
      nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
        name: "{{ policy_name }}"
        description: "Example VM anti-affinity policy"
        categories:
          - ext_id: "{{ category_ext_id_1 }}"
        state: present
        wait: true
      register: create_result

    - name: Print create result
      ansible.builtin.debug:
        var: create_result

    - name: Set policy ext_id
      ansible.builtin.set_fact:
        policy_ext_id: "{{ create_result.ext_id }}"

    ################################################################################
    # Update operations
    ################################################################################

    - name: Update VM anti-affinity policy
      nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
        ext_id: "{{ policy_ext_id }}"
        name: "{{ policy_name }}_updated"
        description: "Updated example VM anti-affinity policy"
        categories:
          - ext_id: "{{ category_ext_id_1 }}"
          - ext_id: "{{ category_ext_id_2 }}"
        state: present
        wait: true
      register: update_result

    - name: Print update result
      ansible.builtin.debug:
        var: update_result

    - name: Verify idempotency - update with same values
      nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
        ext_id: "{{ policy_ext_id }}"
        name: "{{ policy_name }}_updated"
        description: "Updated example VM anti-affinity policy"
        categories:
          - ext_id: "{{ category_ext_id_1 }}"
          - ext_id: "{{ category_ext_id_2 }}"
        state: present
        wait: true
      register: idempotent_result

    - name: Print idempotency result
      ansible.builtin.debug:
        var: idempotent_result

    ################################################################################
    # Info operations
    ################################################################################

    - name: Fetch VM anti-affinity policy by ext_id
      nutanix.ncp.ntnx_vm_anti_affinity_policies_info_v2:
        ext_id: "{{ policy_ext_id }}"
      register: get_result

    - name: Print get result
      ansible.builtin.debug:
        var: get_result

    - name: List all VM anti-affinity policies
      nutanix.ncp.ntnx_vm_anti_affinity_policies_info_v2:
      register: list_result

    - name: Print list result
      ansible.builtin.debug:
        var: list_result

    ################################################################################
    # Delete operations
    ################################################################################

    - name: Delete VM anti-affinity policy - check mode
      nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
        ext_id: "{{ policy_ext_id }}"
        state: absent
        wait: true
      register: delete_check_result
      check_mode: true

    - name: Print delete check mode result
      ansible.builtin.debug:
        var: delete_check_result

    - name: Delete VM anti-affinity policy
      nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
        ext_id: "{{ policy_ext_id }}"
        state: absent
        wait: true
      register: delete_result

    - name: Print delete result
      ansible.builtin.debug:
        var: delete_result
