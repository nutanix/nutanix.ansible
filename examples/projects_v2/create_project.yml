---
- name: Create a Nutanix Project
  hosts: localhost
  gather_facts: false
  module_defaults:
    group/nutanix.ncp.ntnx:
      nutanix_host: <pc_ip>
      nutanix_username: <user>
      nutanix_password: <pass>
      validate_certs: false
  tasks:
    - name: Create a project with name and description
      nutanix.ncp.ntnx_projects_v2:
        state: present
        name: "production-project"
        project_id: "prod-001"
        description: "Production environment project for team A"
      register: result

    - name: Display project details
      ansible.builtin.debug:
        var: result.response

    - name: Display project ext_id
      ansible.builtin.debug:
        msg: "Project created with ext_id: {{ result.ext_id }}"
