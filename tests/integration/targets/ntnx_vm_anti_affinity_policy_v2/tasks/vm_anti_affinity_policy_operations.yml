---
- name: Start testing ntnx_vm_anti_affinity_policy_v2
  ansible.builtin.debug:
    msg: Start testing ntnx_vm_anti_affinity_policy_v2

- name: Generate random name
  ansible.builtin.set_fact:
    random_name:
      "ansible_{{ query('community.general.random_string', numbers=false,
      special=false, length=12)[0] }}"

- name: Set policy names
  ansible.builtin.set_fact:
    policy_name: "{{ random_name }}_anti_affinity_test"
    todelete_categories: []

- name: Set cluster variables
  ansible.builtin.set_fact:
    node_indices: [0, 1, 2, 3]
    prefix_name: ansible_cluster_test
    pe_ssh_cmd: sshpass -p '{{ clusters[0].pe_password }}' ssh -o
      StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null {{
      clusters[0].pe_username }}@{{ clusters[0].nodes[0].cvm_ip }}
    reset_username_password: /home/nutanix/prism/cli/ncli user reset-password
      user-name={{ username_for_tests }} password={{ password_for_tests }}

- name: Set cluster name and reset command
  ansible.builtin.set_fact:
    cluster_name: "{{ prefix_name }}_{{ clusters[0].name }}"
    reset_command: '{{ pe_ssh_cmd }} "{{ reset_username_password }}"'

- name: Check if each cluster node is unconfigured
  ansible.builtin.command: "sshpass -p \"{{ clusters[0].pe_password }}\" ssh -o
    StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \\ {{
    clusters[0].pe_username }}@{{ clusters[0].nodes[item].cvm_ip }}
    \"/usr/local/nutanix/cluster/bin/cluster status\""
  loop: "{{ node_indices }}"
  register: results
  ignore_errors: true
  changed_when: results.rc != 0
  no_log: true

# verify that all nodes are unconfigured by checking the return code and stderr in all of them
- name: Debug - Assert that all cluster nodes are unconfigured
  ansible.builtin.debug:
    var: results

- name: Assert that all cluster nodes are unconfigured
  ansible.builtin.assert:
    that:
      - results.results | map(attribute='rc') | select('equalto', 1) | list |
        length == 4
      - results.results | map(attribute='stderr') | select('search', 'Cluster is
        currently unconfigured') | list | length == 4
    fail_msg: Cannot create cluster, one or more nodes are already configured
    success_msg: All cluster nodes are unconfigured

- name: Discover unconfigured nodes
  nutanix.ncp.ntnx_discover_unconfigured_nodes_v2:
    address_type: "IPV4"
    ip_filter_list:
      - ipv4:
          value: "{{ clusters[0].nodes[item].cvm_ip }}"
  loop: "{{ node_indices }}"
  register: results
  ignore_errors: true

- name: Debug - Assert discover unconfigured nodes status for each node
  ansible.builtin.debug:
    var: results

- name: Assert discover unconfigured nodes status for each node
  ansible.builtin.assert:
    that:
      - item.changed == false
      - item.failed == false
      - item.response.ext_id is defined
      - item.response.response.node_list.0.cvm_ip.ipv4.value | string in "{{
        clusters[0].nodes }}"
      - results | map(attribute='response.node_list.0.cvm_ip.ipv4.value') | list
        | length == clusters[0].nodes | length
    fail_msg: "Discover unconfigured nodes failed"
    success_msg: "Discover unconfigured nodes passed"
  loop: "{{ results.results }}"
  no_log: true

- name: Run cluster create prechecks
  nutanix.ncp.ntnx_clusters_v2:
    name: "{{ clusters[0].name }}"
    nodes:
      node_list:
        - controller_vm_ip:
            ipv4:
              value: "{{ clusters[0].nodes[0].cvm_ip }}"
        - controller_vm_ip:
            ipv4:
              value: "{{ clusters[0].nodes[1].cvm_ip }}"
        - controller_vm_ip:
            ipv4:
              value: "{{ clusters[0].nodes[2].cvm_ip }}"
    config:
      cluster_function: "{{ clusters[0].config.cluster_functions }}"
      authorized_public_key_list:
        - name: "{{ clusters[0].config.auth_public_keys[0].name }}"
          key: "{{ clusters[0].config.auth_public_keys[0].key }}"
      redundancy_factor: "{{ clusters[0].config.redundancy_factor_cluster_expanding }}"
      cluster_arch: "{{ clusters[0].config.cluster_arch }}"
      fault_tolerance_state:
        domain_awareness_level: "{{
          clusters[0].config.fault_tolerance_state.domain_awareness_level_clust\
          er_expanding }}"
    network:
      external_address:
        ipv4:
          value: "{{ clusters[0].network.virtual_ip }}"
      external_data_service_ip:
        ipv4:
          value: "{{ clusters[0].network.iscsi_ip }}"
      ntp_server_ip_list:
        - fqdn:
            value: "{{ clusters[0].network.ntp_servers[0] }}"
        - fqdn:
            value: "{{ clusters[0].network.ntp_servers[1] }}"
        - fqdn:
            value: "{{ clusters[0].network.ntp_servers[2] }}"
        - fqdn:
            value: "{{ clusters[0].network.ntp_servers[3] }}"
      name_server_ip_list:
        - ipv4:
            value: "{{ clusters[0].network.dns_servers[0] }}"
        - ipv4:
            value: "{{ clusters[0].network.dns_servers[1] }}"
      smtp_server:
        email_address: "{{ clusters[0].network.smtp_server.email_address }}"
        server:
          ip_address:
            ipv4:
              value: "{{ clusters[0].network.smtp_server.ip }}"
          port: "{{ clusters[0].network.smtp_server.port }}"
          username: "{{ clusters[0].network.smtp_server.username }}"
          password: "{{ clusters[0].network.smtp_server.password }}"
        type: "{{ clusters[0].network.smtp_server.type }}"
    dryrun: true
    timeout: 1800
  register: result
  ignore_errors: true

- name: Debug - Verify cluster create prechecks run
  ansible.builtin.debug:
    var: result

- name: Verify cluster create prechecks run
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == false
      - result.task_ext_id is defined
      - result.response.status == "SUCCEEDED"
    fail_msg: Cluster create prechecks failed
    success_msg: Cluster create prechecks passed

- name: Create 3 nodes cluster with minimum spec
  nutanix.ncp.ntnx_clusters_v2:
    name: "{{cluster_name}}"
    nodes:
      node_list:
        - controller_vm_ip:
            ipv4:
              value: "{{ clusters[0].nodes[0].cvm_ip }}"
        - controller_vm_ip:
            ipv4:
              value: "{{ clusters[0].nodes[1].cvm_ip }}"
        - controller_vm_ip:
            ipv4:
              value: "{{ clusters[0].nodes[2].cvm_ip }}"
    config:
      cluster_function: "{{ clusters[0].config.cluster_functions }}"
      redundancy_factor: "{{ clusters[0].config.redundancy_factor_cluster_expanding }}"
      cluster_arch: "{{ clusters[0].config.cluster_arch }}"
      fault_tolerance_state:
        domain_awareness_level: "{{
          clusters[0].config.fault_tolerance_state.domain_awareness_level_clust\
          er_expanding }}"
    timeout: 1800
  register: result
  ignore_errors: true

- name: Debug - Verify cluster create task status
  ansible.builtin.debug:
    var: result

- name: Verify cluster create task status
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == true
      - result.task_ext_id is defined
      - result.response.status == "SUCCEEDED"
    fail_msg: Cluster create failed
    success_msg: Cluster create passed

- name: Reset username and password
  ansible.builtin.command: "{{ reset_command }}"
  register: result
  ignore_errors: true
  changed_when: result.rc != 0

- name: List all clusters to get prism central external ID
  nutanix.ncp.ntnx_clusters_info_v2:
    filter: "config/clusterFunction/any(t:t eq
      Clustermgmt.Config.ClusterFunctionRef'PRISM_CENTRAL')"
  register: result
  ignore_errors: true

- name: Get prism central external ID
  ansible.builtin.set_fact:
    prism_central_external_id: "{{ result.response[0].ext_id }}"

- name: Run PE PC registration
  nutanix.ncp.ntnx_pc_registration_v2:
    ext_id: "{{ prism_central_external_id }}"
    remote_cluster:
      aos_remote_cluster:
        remote_cluster:
          address:
            ipv4:
              value: "{{ clusters[0].nodes[0].cvm_ip }}"
          credentials:
            authentication:
              username: "{{ username_for_tests }}"
              password: "{{ password_for_tests }}"
  register: result
  ignore_errors: true

- name: Debug - Run PE PC registration status
  ansible.builtin.debug:
    var: result

- name: Run PE PC registration status
  ansible.builtin.assert:
    that:
      - result.changed == true
      - result.ext_id is defined
      - result.ext_id == prism_central_external_id
      - result.response.status == 'SUCCEEDED'
      - result.task_ext_id is defined
    fail_msg: "Run PE PC registration failed"
    success_msg: "Run PE PC registration passed"

- name: Sleep for 1 minute
  ansible.builtin.pause:
    seconds: 60

- name: Fetch cluster using name
  nutanix.ncp.ntnx_clusters_info_v2:
    filter: name eq '{{ cluster_name }}'
  register: result
  ignore_errors: true

- name: Debug - Verify listing
  ansible.builtin.debug:
    var: result

- name: Verify listing
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.response | length > 0
    fail_msg: Failed verifying PE PC registration
    success_msg: PE PC registration passed successfully

- name: Set cluster external ID
  ansible.builtin.set_fact:
    cluster_ext_id: "{{ result.response[0].ext_id }}"

- name: Fetch cluster info using external ID
  nutanix.ncp.ntnx_clusters_info_v2:
    ext_id: "{{ cluster_ext_id }}"
  register: result
  ignore_errors: true

- name: Debug - Verify created cluster's details using cluster info
  ansible.builtin.debug:
    var: result

- name: Verify created cluster's details using cluster info
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.ext_id == cluster_ext_id
      - result.response.name == "{{ cluster_name }}"
      - result.response.nodes.node_list[0].controller_vm_ip.ipv4.value == "{{
        clusters[0].nodes[0].cvm_ip }}"
      - result.response.nodes.node_list[1].controller_vm_ip.ipv4.value == "{{
        clusters[0].nodes[1].cvm_ip }}"
      - result.response.nodes.node_list[2].controller_vm_ip.ipv4.value == "{{
        clusters[0].nodes[2].cvm_ip }}"
      - result.response.config.cluster_function[0] == "{{
        clusters[0].config.cluster_functions[0] }}"
      - result.response.config.redundancy_factor ==
        clusters[0].config.redundancy_factor_cluster_expanding
      - result.response.config.cluster_arch == "{{
        clusters[0].config.cluster_arch }}"
      - >
        result.response.config.fault_tolerance_state.domain_awareness_level ==
        "{{
        clusters[0].config.fault_tolerance_state.domain_awareness_level_cluster_expanding
        }}"
    fail_msg: Failed verifying cluster creation
    success_msg: Cluster creation passed successfully

- name: Create categories for anti-affinity policy tests
  nutanix.ncp.ntnx_categories_v2:
    key: "{{ random_name }}_af_key_{{ item }}"
    value: "{{ random_name }}_af_value_{{ item }}"
    description: "ansible anti-affinity category"
  register: category_create_result
  ignore_errors: true
  loop: "{{ range(0, 5) | list }}"

- name: Debug - Create categories for anti-affinity policy tests status
  ansible.builtin.debug:
    var: category_create_result

- name: Create categories for anti-affinity policy tests status
  ansible.builtin.assert:
    that:
      - category_create_result.changed == true
      - category_create_result is defined
      - category_create_result.results | length == 5
      - category_create_result.msg == "All items completed"
      - item.failed == false
      - item.response is defined
      - item.response.ext_id is defined
    fail_msg: "Categories creation failed"
    success_msg: "Categories created successfully"
  loop: "{{ category_create_result.results }}"

- name: Save categories ext_id to delete list
  ansible.builtin.set_fact:
    todelete_categories: "{{ todelete_categories + [ item.response.ext_id ] }}"
  loop: "{{ category_create_result.results }}"

- name: Set anti-affinity test variables
  ansible.builtin.set_fact:
    vm_name_prefix: "{{ random_name }}_af_vm"
    categories_ext_ids: "{{ todelete_categories }}"
    todelete: []
    todelete_categories: "{{ todelete_categories }}"

##################################################################################
# Create - Check mode
##################################################################################

- name: Generate spec for a VM anti-affinity policy using check mode
  nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
    state: present
    name: "test_policy_1"
    description: "test_policy_1_description"
    categories:
      - ext_id: "00065133-7ad0-1d82-451d-5254003d8207"
      - ext_id: "00065133-7ad0-1d82-451d-5254003d8209"
  register: result
  ignore_errors: true
  check_mode: true

- name: Debug - Verify generated spec for a VM anti-affinity policy using check mode
  ansible.builtin.debug:
    var: result

- name: Verify generated spec for a VM anti-affinity policy using check mode
  ansible.builtin.assert:
    that:
      - result.changed == false
      - result.failed == false
      - result.response is defined
      - result.response.categories | length == 2
      - result.response.categories[0].ext_id ==
        "00065133-7ad0-1d82-451d-5254003d8207"
      - result.response.categories[1].ext_id ==
        "00065133-7ad0-1d82-451d-5254003d8209"
      - result.response.name == 'test_policy_1'
      - result.response.description == "test_policy_1_description"
    fail_msg:
      "Verify generated spec for a VM anti-affinity policy using check mode
      failed"
    success_msg:
      "Verify generated spec for a VM anti-affinity policy using check
      mode passed"

##################################################################################
# Create - Minimal spec
##################################################################################

- name: Create a VM anti-affinity policy with minimal spec
  nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
    state: present
    name: "{{ policy_name }}_1"
    categories:
      - ext_id: "{{ categories_ext_ids[0] }}"
  register: result
  ignore_errors: true

- name: Debug - Verify created VM anti-affinity policy with minimal spec
  ansible.builtin.debug:
    var: result

- name: Verify created VM anti-affinity policy with minimal spec
  ansible.builtin.assert:
    that:
      - result.changed == true
      - result.failed == false
      - result.response is defined
      - result.response.categories[0].ext_id == "{{ categories_ext_ids[0] }}"
      - result.response.name == "{{ policy_name }}_1"
    fail_msg: "Verify created VM anti-affinity policy with minimal spec failed"
    success_msg: "Verify created VM anti-affinity policy with minimal spec passed"

- name: Add to delete list
  ansible.builtin.set_fact:
    todelete: '{{ todelete + [result["response"]["ext_id"]] }}'

##################################################################################
# Create - Full spec
##################################################################################

- name: Create a VM anti-affinity policy with full spec
  nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
    state: present
    name: "{{ policy_name }}_3"
    description: "{{ policy_name }}_3_description"
    categories:
      - ext_id: "{{ categories_ext_ids[1] }}"
      - ext_id: "{{ categories_ext_ids[2] }}"
      - ext_id: "{{ categories_ext_ids[3] }}"
  register: result
  ignore_errors: true

- name: Debug - Verify created VM anti-affinity policy with full spec
  ansible.builtin.debug:
    var: result

- name: Verify created VM anti-affinity policy with full spec
  ansible.builtin.assert:
    that:
      - result.changed == true
      - result.failed == false
      - result.response is defined
      - result.response.name == "{{ policy_name }}_3"
      - result.response.description == "{{ policy_name }}_3_description"
      - result.response.categories | length == 3
      - result.response.categories[0].ext_id == "{{ categories_ext_ids[1] }}"
      - result.response.categories[1].ext_id == "{{ categories_ext_ids[2] }}"
      - result.response.categories[2].ext_id == "{{ categories_ext_ids[3] }}"
    fail_msg: "Verify created VM anti-affinity policy with full spec failed"
    success_msg: "Verify created VM anti-affinity policy with full spec passed"

- name: Add to delete list
  ansible.builtin.set_fact:
    todelete: '{{ todelete + [result["response"]["ext_id"]] }}'

##################################################################################
# Update - Check mode
##################################################################################

- name:
    Generate spec for updating an existing VM anti-affinity policy using check
    mode
  nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
    state: present
    ext_id: "{{ todelete[0] }}"
    name: "test_policy_2"
    description: "description for test_policy_2 updated"
    categories:
      - ext_id: "00065133-7ad0-1d82-451d-5254003d8207"
      - ext_id: "00065133-7ad0-1d82-451d-5254003d8209"
  register: result
  ignore_errors: true
  check_mode: true

- name: Debug - Verify generated spec for updating an existing VM anti-affinity policy using check mode
  ansible.builtin.debug:
    var: result

- name: Verify generated spec for updating an existing VM anti-affinity policy
    using check mode
  ansible.builtin.assert:
    that:
      - result.changed == false
      - result.failed == false
      - result.response is defined
      - result.response.name == "test_policy_2"
      - result.response.ext_id == "{{ todelete[0] }}"
      - result.response.description == "description for test_policy_2 updated"
      - result.response.categories | length == 2
      - result.response.categories[0].ext_id ==
        "00065133-7ad0-1d82-451d-5254003d8207"
      - result.response.categories[1].ext_id ==
        "00065133-7ad0-1d82-451d-5254003d8209"
    fail_msg: "Verify generated spec for updating an existing VM anti-affinity
      policy using check mode failed"
    success_msg:
      "Verify generated spec for updating an existing VM anti-affinity
      policy using check mode passed"

##################################################################################
# Update Anti-Affinity Policy
##################################################################################

- name: Update an existing VM anti-affinity policy
  nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
    state: present
    ext_id: "{{ todelete[0] }}"
    name: "{{ policy_name }}_updated"
    description: "description for {{ policy_name }}_updated"
    categories:
      - ext_id: "{{ categories_ext_ids[0] }}"
      - ext_id: "{{ categories_ext_ids[4] }}"
  register: result
  ignore_errors: true

- name: Debug - Verify updated VM anti-affinity Policy
  ansible.builtin.debug:
    var: result

- name: Verify updated VM anti-affinity Policy
  ansible.builtin.assert:
    that:
      - result.changed == true
      - result.failed == false
      - result.response is defined
      - result.response.name == "{{ policy_name }}_updated"
      - result.response.description == "description for {{ policy_name
        }}_updated"
      - result.response.categories | length == 2
      - result.response.categories[0].ext_id == "{{ categories_ext_ids[0] }}"
      - result.response.categories[1].ext_id == "{{ categories_ext_ids[4] }}"
    fail_msg: "Verify updated VM anti-affinity Policy failed"
    success_msg: "Verify updated VM anti-affinity Policy passed"

##################################################################################
# Idempotency check
##################################################################################

- name: Check for idempotency by updating the same policy with same spec
  nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
    state: present
    ext_id: "{{ todelete[0] }}"
    name: "{{ policy_name }}_updated"
    description: "description for {{ policy_name }}_updated"
    categories:
      - ext_id: "{{ categories_ext_ids[0] }}"
      - ext_id: "{{ categories_ext_ids[4] }}"
  register: result
  ignore_errors: true

- name: Debug - Verify idempotency by updating the same policy with same spec
  ansible.builtin.debug:
    var: result

- name: Verify idempotency by updating the same policy with same spec
  ansible.builtin.assert:
    that:
      - result.changed == false
      - result.failed == false
      - result.msg == "Nothing to change."
    fail_msg: "Verify idempotency by updating the same policy with same spec failed"
    success_msg: "Verify idempotency by updating the same policy with same spec passed"

##################################################################################
# Get Anti-Affinity Policy by ext_id
##################################################################################

- name: Get an existing VM anti-affinity policy by ext_id
  nutanix.ncp.ntnx_vm_anti_affinity_policies_info_v2:
    ext_id: "{{ todelete[1] }}"
  register: result
  ignore_errors: true

- name: Debug - Verify retrieved VM anti-affinity policy by ext_id
  ansible.builtin.debug:
    var: result

- name: Verify retrieved VM anti-affinity policy by ext_id
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == false
      - result.failed == false
      - result.response.ext_id == "{{ todelete[1] }}"
      - result.response.name == "{{ policy_name }}_3"
      - result.response.description == "{{ policy_name }}_3_description"
      - result.response.categories | length == 3
      - result.response.categories[0].ext_id == "{{ categories_ext_ids[1] }}"
      - result.response.categories[1].ext_id == "{{ categories_ext_ids[2] }}"
      - result.response.categories[2].ext_id == "{{ categories_ext_ids[3] }}"
    fail_msg: "Verify retrieved VM anti-affinity policy by ext_id failed"
    success_msg: "Verify retrieved VM anti-affinity policy by ext_id passed"

##################################################################################
# List all Anti-Affinity Policies
##################################################################################

- name: List all VM anti-affinity policies
  nutanix.ncp.ntnx_vm_anti_affinity_policies_info_v2:
  register: result
  ignore_errors: true

- name: Debug - Verify list of all VM anti-affinity policies
  ansible.builtin.debug:
    var: result

- name: Verify list of all VM anti-affinity policies
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == false
      - result.failed == false
      - result.response | length > 0
      - result.total_available_results is defined
      - result.total_available_results > 0
    fail_msg: "Verify list of all VM anti-affinity policies failed"
    success_msg: "Verify list of all VM anti-affinity policies passed"

##################################################################################
# List Anti-Affinity Policies with filter
##################################################################################

- name: List VM anti-affinity policies with filter by name
  nutanix.ncp.ntnx_vm_anti_affinity_policies_info_v2:
    filter: "name eq '{{ policy_name }}_updated'"
  register: result
  ignore_errors: true

- name: Debug - Verify list of VM anti-affinity policies with filter by name
  ansible.builtin.debug:
    var: result

- name: Verify list of VM anti-affinity policies with filter by name
  ansible.builtin.assert:
    that:
      - result.changed == false
      - result.failed == false
      - result.response is defined
      - result.response | length == 1
      - result.response[0].name == "{{ policy_name }}_updated"
      - result.response[0].description == "description for {{ policy_name
        }}_updated"
      - result.response[0].categories | length == 2
      - result.response[0].categories[0].ext_id == "{{ categories_ext_ids[0] }}"
      - result.response[0].categories[1].ext_id == "{{ categories_ext_ids[4] }}"
      - result.total_available_results is defined
      - result.total_available_results == 1
    fail_msg: "Verify list of VM anti-affinity policies with filter by name failed"
    success_msg: "Verify list of VM anti-affinity policies with filter by name passed"

##################################################################################
# List Anti-Affinity Policies with limit
##################################################################################

- name: List VM anti-affinity policies with limit 1
  nutanix.ncp.ntnx_vm_anti_affinity_policies_info_v2:
    limit: 1
  register: result
  ignore_errors: true

- name: Debug - Verify list of VM anti-affinity policies with limit 1
  ansible.builtin.debug:
    var: result

- name: Verify list of VM anti-affinity policies with limit 1
  ansible.builtin.assert:
    that:
      - result.changed == false
      - result.failed == false
      - result.response is defined
      - result.response | length == 1
    fail_msg: "Verify list of VM anti-affinity policies with limit 1 failed"
    success_msg: "Verify list of VM anti-affinity policies with limit 1 passed"

##################################################################################
# Negative - Create without name
##################################################################################

- name: Create VM anti-affinity policy without name (negative test)
  nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
    categories:
      - ext_id: "{{ categories_ext_ids[0] }}"
  register: result
  ignore_errors: true

