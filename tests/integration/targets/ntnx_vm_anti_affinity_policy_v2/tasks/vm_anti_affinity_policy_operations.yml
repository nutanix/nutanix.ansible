##################################################################################
# Functional test - Verify anti-affinity policies enforce host placement.
# Uses categories_ext_ids[1..2] which are owned by todelete[1] (the full-spec
# policy). Each pair of VMs shares a single category, so anti-affinity should
# force the two VMs in each pair onto different hosts.
##################################################################################

- name: Create 4 VMs (2 per category) with minimum spec and auto cluster selection
  nutanix.ncp.ntnx_vms_v2:
    state: present
    name: "{{ vm_name_prefix }}_{{ item + 1 }}"
    description: "anti-affinity test VM"
    categories:
      - ext_id: "{{ categories_ext_ids[(item // 2) + 1] }}"
  register: vms_result
  loop: "{{ range(0, 4) | list }}"
  ignore_errors: true

- name: Collect VM ext_ids for cleanup
  ansible.builtin.set_fact:
    vms_todelete: "{{ vms_result.results | map(attribute='ext_id') | list }}"

- name: Debug - Verify creation of all 6 VMs (2 per category)
  ansible.builtin.debug:
    var: vms_result

- name: Verify creation of all 4 VMs (2 per category)
  ansible.builtin.assert:
    that:
      - vms_result.results | length == 4
      - vms_todelete | length == 4
      - item.changed == true
      - item.failed == false
      - item.response.categories[0].ext_id == categories_ext_ids[(vm_idx // 2) +
        1]
    fail_msg: "Failed to create VM at index {{ vm_idx }} (expected category {{
      categories_ext_ids[(vm_idx // 2) + 1] }})"
    success_msg: "VM {{ vm_idx + 1 }} created successfully with category {{
      categories_ext_ids[(vm_idx // 2) + 1] }}"
  loop: "{{ vms_result.results }}"
  loop_control:
    index_var: vm_idx

- name: Power on all 4 VMs
  nutanix.ncp.ntnx_vms_power_actions_v2:
    state: power_on
    ext_id: "{{ item }}"
  register: power_on_result
  loop: "{{ vms_todelete }}"
  ignore_errors: true

- name: Debug - Power on Status
  ansible.builtin.debug:
    var: power_on_result

- name: Power on Status
  ansible.builtin.assert:
    that:
      - item.response is defined
      - item.changed == true
      - item.failed == false
      - item.response.status == 'SUCCEEDED'
    fail_msg: "Failed to power on one or more VMs"
    success_msg: "Power on requests for all VMs accepted successfully"
  loop: "{{ power_on_result.results }}"

- name: List VM anti-affinity policy compliance states until pending is observed
  nutanix.ncp.ntnx_vm_anti_affinity_policy_compliance_info_v2:
    ext_id: "{{ todelete[1] }}"
  register: pending_compliance_result
  until: >-
    pending_compliance_result.response is defined and
    (
      (
        pending_compliance_result.response
        | selectattr("compliance_status._object_type", "defined")
        | selectattr(
          "compliance_status._object_type",
          "equalto",
          "vmm.v4.ahv.policies.PendingVmAntiAffinityPolicy"
        )
        | list
        | length
      ) > 0
      or
      (
        pending_compliance_result.response
        | selectattr("compliance_status._object_type", "defined")
        | selectattr(
          "compliance_status._object_type",
          "equalto",
          "vmm.v4.ahv.policies.CompliantVmAntiAffinityPolicy"
        )
        | list
        | length
      ) > 0
    )
  retries: 12
  delay: 5
  ignore_errors: true

- name: Debug - Verify pending VM anti-affinity policy compliance states response
  ansible.builtin.debug:
    var: pending_compliance_result

- name: Verify pending VM anti-affinity policy compliance states response
  ansible.builtin.assert:
    that:
      - pending_compliance_result.changed == false
      - pending_compliance_result.failed == false
      - pending_compliance_result.response is defined
      - pending_compliance_result.response | length > 0
      - >-
        (
          pending_compliance_result.response
          | selectattr("compliance_status._object_type", "defined")
          | selectattr(
            "compliance_status._object_type",
            "equalto",
            "vmm.v4.ahv.policies.PendingVmAntiAffinityPolicy"
          )
          | list
          | length
        ) > 0
        or
        (
          pending_compliance_result.response
          | selectattr("compliance_status._object_type", "defined")
          | selectattr(
            "compliance_status._object_type",
            "equalto",
            "vmm.v4.ahv.policies.CompliantVmAntiAffinityPolicy"
          )
          | list
          | length
        ) > 0
    fail_msg: "Verify pending VM anti-affinity policy compliance states failed"
    success_msg: "Verify pending VM anti-affinity policy compliance states passed"

- name: Wait until all VMs are powered on
  nutanix.ncp.ntnx_vms_info_v2:
    ext_id: "{{ item }}"
  register: wait_result
  until: wait_result.response.power_state == 'ON'
  retries: 60
  delay: 5
  loop: "{{ vms_todelete }}"
  ignore_errors: true

- name: Fetch info for all 4 VMs after power-on
  nutanix.ncp.ntnx_vms_info_v2:
    ext_id: "{{ item }}"
  register: vms_info
  loop: "{{ vms_todelete }}"
  ignore_errors: true

- name: Debug - Assert all 4 VMs are powered on and have a host assigned
  ansible.builtin.debug:
    var: vms_info

- name: Assert all 4 VMs are powered on and have a host assigned
  ansible.builtin.assert:
    that:
      - item.response is defined
      - item.response.power_state == 'ON'
      - item.response.host is defined
      - item.response.host is not none
      - item.response.host.ext_id is defined
    fail_msg:
      "VM {{ item.response.ext_id | default('unknown') }} is not powered on
      or has no host assigned"
    success_msg: "VM {{ item.response.ext_id }} is powered on and hosted on {{
      item.response.host.ext_id }}"
  loop: "{{ vms_info.results }}"

- name: List VM anti-affinity policy compliance states
  nutanix.ncp.ntnx_vm_anti_affinity_policy_compliance_info_v2:
    ext_id: "{{ todelete[1] }}"
  register: compliance_result
  ignore_errors: true

- name: Debug - Verify VM anti-affinity policy compliance states response
  ansible.builtin.debug:
    var: compliance_result

- name: Verify VM anti-affinity policy compliance states response
  ansible.builtin.assert:
    that:
      - compliance_result.changed == false
      - compliance_result.failed == false
      - compliance_result.response is defined
      - compliance_result.response | length > 0
      - compliance_result.total_available_results is defined
      - compliance_result.total_available_results > 0
      - compliance_result.total_available_results == (compliance_result.response | length)
      - compliance_result.response | length == (vms_todelete | length)
      - >-
        (
          compliance_result.response | map(attribute='ext_id') | list | sort
        ) == (
          vms_todelete | list | sort
        )
      - >-
        (
          compliance_result.response
          | selectattr("compliance_status._object_type", "defined")
          | selectattr(
            "compliance_status._object_type",
            "equalto",
            "vmm.v4.ahv.policies.CompliantVmAntiAffinityPolicy"
          )
          | list
          | length
        ) == (compliance_result.response | length)
    fail_msg: "Verify VM anti-affinity policy compliance states failed"
    success_msg: "Verify VM anti-affinity policy compliance states passed"

- name: Debug - Assert that VMs in the same category are hosted on different hosts
  ansible.builtin.debug:
    var: vms_info

- name: Assert that VMs in the same category are hosted on different hosts
  ansible.builtin.assert:
    that:
      - vms_info.results[0].response.host.ext_id !=
        vms_info.results[1].response.host.ext_id
      - vms_info.results[2].response.host.ext_id !=
        vms_info.results[3].response.host.ext_id
    fail_msg: >-
      Anti-affinity NOT enforced - VMs in the same category are on the same
      host. Cat1 hosts: [{{ vms_info.results[0].response.host.ext_id }}, {{
      vms_info.results[1].response.host.ext_id }}]. Cat2 hosts: [{{
      vms_info.results[2].response.host.ext_id }}, {{
      vms_info.results[3].response.host.ext_id }}].
    success_msg:
      "Anti-affinity enforced successfully - VMs in same category are on
      different hosts"

- name: Delete all 4 created VMs
  nutanix.ncp.ntnx_vms_v2:
    state: absent
    ext_id: "{{ item }}"
  register: result
  loop: "{{ vms_todelete }}"
  ignore_errors: true

- name: Debug - VM deletion status
  ansible.builtin.debug:
    var: result

- name: VM deletion status
  ansible.builtin.assert:
    that:
      - item.response is defined
      - item.changed == true
      - item.failed == false
      - item.response.status == 'SUCCEEDED'
      - result.changed == true
      - result.msg == "All items completed"
      - result.results | length == 4
    fail_msg: "Failed to delete one or more VMs"
    success_msg: "All 4 VMs deleted successfully"
  loop: "{{ result.results }}"

##################################################################################
# Delete policy with check mode enabled
##################################################################################

- name: Delete policy with check mode enabled
  nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
    state: absent
    ext_id: "{{ todelete[0] }}"
  register: result
  ignore_errors: true
  check_mode: true

- name: Debug - Deletion check mode status
  ansible.builtin.debug:
    var: result

- name: Deletion check mode status
  ansible.builtin.assert:
    that:
      - result.msg is defined
      - result.changed == false
      - result.failed == false
      - result.ext_id == "{{ todelete[0] }}"
      - result.msg == "Policy with ext_id:{{ todelete[0] }} will be deleted."
    fail_msg: "Delete policy with check mode enabled failed"
    success_msg: "Delete policy with check mode enabled passed"

##################################################################################
# Delete all vm anti-affinity policies
##################################################################################

- name: Delete all policies
  nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
    state: absent
    ext_id: "{{ item }}"
  register: result
  ignore_errors: true
  loop: "{{ todelete }}"

- name: Debug - Deletion status
  ansible.builtin.debug:
    var: result

- name: Deletion status
  ansible.builtin.assert:
    that:
      - item.changed == true
      - item.failed == false
      - item.response is defined
      - item.response.status == 'SUCCEEDED'
      - result.changed == true
      - result.msg == "All items completed"
      - result.results | length == 2
    fail_msg: "Delete policies failed"
    success_msg: "Delete policies passed"
  loop: "{{ result.results }}"

- name: Delete created categories
  nutanix.ncp.ntnx_categories_v2:
    ext_id: "{{ item }}"
    state: absent
  register: result
  loop: "{{ todelete_categories }}"
  ignore_errors: true

- name: Debug - Categories deletion status
  ansible.builtin.debug:
    var: result

- name: Categories deletion status
  ansible.builtin.assert:
    that:
      - result.changed == true
      - item.failed == false
      - item.changed == true
      - result.results | length == todelete_categories | length
      - result.msg == "All items completed"
    fail_msg: "Unable to delete categories"
    success_msg: "Categories deleted successfully"
  loop: "{{ result.results }}"

- name: Destroy the cluster for cleanup
  nutanix.ncp.ntnx_clusters_v2:
    state: absent
    ext_id: "{{ cluster_ext_id }}"
  register: result
  ignore_errors: true

- name: Debug - Verify cluster deletion
  ansible.builtin.debug:
    var: result

- name: Verify cluster deletion
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == true
      - result.response.status == "SUCCEEDED"
      - result.ext_id == cluster_ext_id
    fail_msg: Failed verifying cluster deletion
    success_msg: Cluster deletion passed successfully
