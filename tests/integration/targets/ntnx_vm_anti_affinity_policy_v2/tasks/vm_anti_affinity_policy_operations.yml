---
- name: Start testing ntnx_vm_anti_affinity_policy_v2
  ansible.builtin.debug:
    msg: Start testing ntnx_vm_anti_affinity_policy_v2

- name: Generate random name
  ansible.builtin.set_fact:
    random_name: "{{ query('community.general.random_string', numbers=false, special=false, length=12)[0] }}"

- name: Set policy names
  ansible.builtin.set_fact:
    policy_name: "{{ random_name }}_anti_affinity_test"

- name: List all categories and choose the first two
  nutanix.ncp.ntnx_categories_info_v2:
  register: result
  ignore_errors: true

- name: Status of all categories
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == false
      - result.failed == false
      - result.response | length > 0
    fail_msg: "Unable to list categories"
    success_msg: "Categories listed successfully"

- name: Set variables
  ansible.builtin.set_fact:
    category_ext_id: '{{ result["response"][0]["ext_id"] }}'
    category_ext_id1: '{{ result["response"][1]["ext_id"] }}'
    category_ext_id2: '{{ result["response"][2]["ext_id"] }}'
    category_ext_id3: '{{ result["response"][3]["ext_id"] }}'

- name: Set todelete list
  ansible.builtin.set_fact:
    todelete: []

##################################################################################
# Create - Check mode
##################################################################################

- name: Create a VM anti-affinity policy - check mode is enabled
  nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
    state: present
    name: "{{ policy_name }}1"
    description: "{{ policy_name }}1_description"
    categories:
      - ext_id: "{{ category_ext_id }}"
    wait: true
  register: result
  ignore_errors: true
  check_mode: true

- name: Creation check mode status
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == false
      - result.failed == false
      - result.response.categories[0].ext_id == "{{ category_ext_id }}"
      - result.response.name == '{{ policy_name }}1'
      - result.response.description == "{{ policy_name }}1_description"
    fail_msg: "Create VM anti-affinity policy check mode failed"
    success_msg: "Create VM anti-affinity policy check mode passed"

##################################################################################
# Create - Minimal spec
##################################################################################

- name: Create a VM anti-affinity policy with minimal spec
  nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
    state: present
    name: "{{ policy_name }}2"
    categories:
      - ext_id: "{{ category_ext_id }}"
    wait: true
  register: result
  ignore_errors: true

- name: Creation status - minimal spec
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == true
      - result.failed == false
      - result.response.categories[0].ext_id == "{{ category_ext_id }}"
      - result.response.name == '{{ policy_name }}2'
    fail_msg: "Create VM anti-affinity policy with minimal spec failed"
    success_msg: "Create VM anti-affinity policy with minimal spec passed"

- name: Add to delete list
  ansible.builtin.set_fact:
    todelete: '{{ todelete + [result["response"]["ext_id"]] }}'

##################################################################################
# Create - Full spec
##################################################################################

- name: Create a VM anti-affinity policy with full spec
  nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
    state: present
    name: "{{ policy_name }}3"
    description: "{{ policy_name }}3_description"
    categories:
      - ext_id: "{{ category_ext_id2 }}"
      - ext_id: "{{ category_ext_id3 }}"
    wait: true
  register: result
  ignore_errors: true

- name: Creation status - full spec
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == true
      - result.failed == false
      - result.response.name == "{{ policy_name }}3"
      - result.response.description == "{{ policy_name }}3_description"
      - result.response.categories | length == 2
    fail_msg: "Create VM anti-affinity policy with full spec failed"
    success_msg: "Create VM anti-affinity policy with full spec passed"

- name: Add to delete list
  ansible.builtin.set_fact:
    todelete: '{{ todelete + [result["response"]["ext_id"]] }}'

##################################################################################
# Update - Check mode
##################################################################################

- name: Update an existing VM anti-affinity policy - check mode is enabled
  nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
    state: present
    ext_id: "{{ todelete[0] }}"
    name: "{{ policy_name }}4"
    description: "{{ policy_name }}4_description"
    categories:
      - ext_id: "{{ category_ext_id1 }}"
    wait: true
  register: result
  ignore_errors: true
  check_mode: true

- name: Update check mode status
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == false
      - result.failed == false
      - result.response.name == "{{ policy_name }}4"
      - result.response.description == "{{ policy_name }}4_description"
      - result.response.categories[0].ext_id == "{{ category_ext_id1 }}"
    fail_msg: "Update VM anti-affinity policy check mode failed"
    success_msg: "Update VM anti-affinity policy check mode passed"
  failed_when: false

##################################################################################
# Update
##################################################################################

- name: Update an existing VM anti-affinity policy
  nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
    state: present
    ext_id: "{{ todelete[0] }}"
    name: "{{ policy_name }}4"
    description: "{{ policy_name }}4_description"
    categories:
      - ext_id: "{{ category_ext_id1 }}"
    wait: true
  register: result
  ignore_errors: true

- name: Update status
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == true
      - result.failed == false
      - result.response.name == "{{ policy_name }}4"
      - result.response.description == "{{ policy_name }}4_description"
      - result.response.categories[0].ext_id == "{{ category_ext_id1 }}"
    fail_msg: "Update VM anti-affinity policy failed"
    success_msg: "Update VM anti-affinity policy passed"
  failed_when: false

##################################################################################
# Idempotency check
##################################################################################

- name: Check for idempotency by updating the same policy
  nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
    state: present
    ext_id: "{{ todelete[0] }}"
    name: "{{ policy_name }}4"
    description: "{{ policy_name }}4_description"
    categories:
      - ext_id: "{{ category_ext_id1 }}"
    wait: true
  register: result
  ignore_errors: true

- name: Idempotency status
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == false
      - result.failed == false
      - result.msg == "Nothing to change."
      - result.ext_id == "{{ todelete[0] }}"
    fail_msg: "Check for idempotency by updating the same policy failed"
    success_msg: "Check for idempotency by updating the same policy passed"
  failed_when: false

##################################################################################
# Info - Get by ext_id
##################################################################################

- name: Get an existing VM anti-affinity policy
  nutanix.ncp.ntnx_vm_anti_affinity_policies_info_v2:
    ext_id: "{{ todelete[0] }}"
  register: result
  ignore_errors: true

- name: Get status
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == false
      - result.failed == false
      - result.response.ext_id == "{{ todelete[0] }}"
    fail_msg: "Get an existing VM anti-affinity policy failed"
    success_msg: "Get an existing VM anti-affinity policy passed"

##################################################################################
# Info - List all
##################################################################################

- name: Retrieve all VM anti-affinity policies
  nutanix.ncp.ntnx_vm_anti_affinity_policies_info_v2:
  register: result
  ignore_errors: true

- name: List status
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == false
      - result.failed == false
      - result.response | length > 0
      - result.total_available_results is defined
      - result.total_available_results > 0
    fail_msg: "Retrieve all VM anti-affinity policies failed"
    success_msg: "Retrieve all VM anti-affinity policies passed"

##################################################################################
# Info - List with filter
##################################################################################

- name: Retrieve VM anti-affinity policies with filter for name
  nutanix.ncp.ntnx_vm_anti_affinity_policies_info_v2:
    filter: "name eq '{{ policy_name }}2'"
  register: result
  ignore_errors: true

- name: Filter status
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == false
      - result.failed == false
      - result.response[0].name == "{{ policy_name }}2"
    fail_msg: "Retrieve VM anti-affinity policies with filter failed"
    success_msg: "Retrieve VM anti-affinity policies with filter passed"

##################################################################################
# Info - List with limit
##################################################################################

- name: Retrieve VM anti-affinity policies with limit 1
  nutanix.ncp.ntnx_vm_anti_affinity_policies_info_v2:
    limit: 1
  register: result
  ignore_errors: true

- name: Limit status
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == false
      - result.failed == false
      - result.response | length == 1
    fail_msg: "Retrieve VM anti-affinity policies with limit 1 failed"
    success_msg: "Retrieve VM anti-affinity policies with limit 1 passed"

##################################################################################
# Negative - Create without name
##################################################################################

- name: Create VM anti-affinity policy without name (negative test)
  nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
    state: present
    categories:
      - ext_id: "{{ category_ext_id }}"
    wait: true
  register: result
  ignore_errors: true

- name: Negative test status - missing name
  ansible.builtin.assert:
    that:
      - result.failed == true
    fail_msg: "Negative test for missing name failed"
    success_msg: "Negative test for missing name passed"

##################################################################################
# Negative - Get non-existent policy
##################################################################################

- name: Get non-existent VM anti-affinity policy
  nutanix.ncp.ntnx_vm_anti_affinity_policies_info_v2:
    ext_id: "12345678-1234-1234-1234-123456789123"
  register: result
  ignore_errors: true

- name: Negative test status - non-existent policy
  ansible.builtin.assert:
    that:
      - result.failed == true
      - result.changed == false
    fail_msg: "Negative test for non-existent policy get failed"
    success_msg: "Negative test for non-existent policy get passed"

##################################################################################
# Negative - Update non-existent policy
##################################################################################

- name: Update non-existent VM anti-affinity policy
  nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
    state: present
    ext_id: "12345678-1234-1234-1234-123456789123"
    name: "non_existent_policy"
    categories:
      - ext_id: "{{ category_ext_id }}"
    wait: true
  register: result
  ignore_errors: true

- name: Negative test status - update non-existent policy
  ansible.builtin.assert:
    that:
      - result.failed == true
      - result.changed == false
    fail_msg: "Negative test for non-existent policy update failed"
    success_msg: "Negative test for non-existent policy update passed"

##################################################################################
# Negative - Delete non-existent policy
##################################################################################

- name: Delete non-existent VM anti-affinity policy
  nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
    state: absent
    ext_id: "12345678-1234-1234-1234-123456789123"
    wait: true
  register: result
  ignore_errors: true

- name: Negative test status - delete non-existent policy
  ansible.builtin.assert:
    that:
      - result.failed == true
      - result.changed == false
    fail_msg: "Negative test for non-existent policy delete failed"
    success_msg: "Negative test for non-existent policy delete passed"

##################################################################################
# Delete - Check mode
##################################################################################

- name: Delete policy with check mode enabled
  nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
    state: absent
    ext_id: "{{ todelete[0] }}"
  register: result
  ignore_errors: true
  check_mode: true

- name: Deletion check mode status
  ansible.builtin.assert:
    that:
      - result.msg is defined
      - result.changed == false
      - result.failed == false
      - result.ext_id == "{{ todelete[0] }}"
      - result.msg == "Policy with ext_id:{{ todelete[0] }} will be deleted."
    fail_msg: "Delete policy with check mode enabled failed"
    success_msg: "Delete policy with check mode enabled passed"

##################################################################################
# Delete
##################################################################################

- name: Delete all policies
  nutanix.ncp.ntnx_vm_anti_affinity_policy_v2:
    state: absent
    ext_id: "{{ item }}"
  register: result
  ignore_errors: true
  loop: "{{ todelete }}"

- name: Deletion status
  ansible.builtin.assert:
    that:
      - item.response is defined
      - item.changed == true
      - item.failed == false
      - item.response.status == 'SUCCEEDED'
    fail_msg: "Delete policies failed"
    success_msg: "Delete policies passed"
  loop: "{{ result.results }}"
