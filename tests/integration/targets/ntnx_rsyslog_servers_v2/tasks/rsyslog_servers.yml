      - result is defined
      - result.changed == false
      - result.failed == true
      - result.msg == "Missing required parameter(s): port"
    success_msg: "Create RSYSLOG server with missing port failed as expected"
    fail_msg: "Create RSYSLOG server with missing port did not fail as expected"

- name: Create RSYSLOG server with missing network_protocol (should fail)
  nutanix.ncp.ntnx_rsyslog_servers_v2:
    state: present
    cluster_ext_id: "{{ cluster.uuid }}"
    server_name: "test_missing_protocol"
    ip_address:
      ipv4:
        value: "192.168.1.100"
    port: 514
  register: result
  ignore_errors: true

- name: Debug result (create missing network_protocol)
  ansible.builtin.debug:
    var: result

- name: Create RSYSLOG server with missing network_protocol status
  ansible.builtin.assert:
    that:
      - result is defined
      - result.changed == false
      - result.failed == true
      - result.msg == "Missing required parameter(s): network_protocol"
    success_msg: "Create RSYSLOG server with missing network_protocol failed as expected"
    fail_msg: "Create RSYSLOG server with missing network_protocol did not fail as
      expected"

- name: Create RSYSLOG server with name that already exists (should fail)
  nutanix.ncp.ntnx_rsyslog_servers_v2:
    cluster_ext_id: "{{ cluster.uuid }}"
    server_name: "{{ rsyslog_name }}"
    ip_address:
      ipv4:
        value: "192.168.1.100"
    port: 514
    network_protocol: "UDP"
  register: result
  ignore_errors: true

- name: Debug result (create duplicate server name)
  ansible.builtin.debug:
    var: result

- name: Create RSYSLOG server with name that already exists status
  ansible.builtin.assert:
    that:
      - result is defined
      - result.changed == false
      - result.failed == true
      - result.response is defined
      - result.response.status == "FAILED"
      - result.response.error_messages | length > 0
    success_msg: "Create RSYSLOG server with name that already exists failed as expected"
    fail_msg: "Create RSYSLOG server with name that already exists did not fail as
      expected"

########################################################################################
# Update RSYSLOG Server Tests
########################################################################################

- name: Generate spec for updating RSYSLOG server using check mode with all
    attributes
  nutanix.ncp.ntnx_rsyslog_servers_v2:
    cluster_ext_id: "{{ cluster.uuid }}"
    ext_id: "{{ todelete[1] }}"
    server_name: "test_update_server_name"
    ip_address:
      ipv4:
        value: "192.168.1.200"
        prefix_length: 32
    port: 515
    network_protocol: "TCP"
    modules:
      - name: "ZOOKEEPER"
        log_severity_level: "CRITICAL"
        should_log_monitor_files: false
      - name: "AUDIT"
        log_severity_level: "ALERT"
        should_log_monitor_files: true
      - name: "CALM"
        log_severity_level: "WARNING"
        should_log_monitor_files: false
  check_mode: true
  register: result
  ignore_errors: true

- name: Debug result (update RSYSLOG check mode full spec)
  ansible.builtin.debug:
    var: result

- name: Generate spec for updating RSYSLOG server using check mode status
  ansible.builtin.assert:
    that:
      - result is defined
      - result.changed == false
      - result.failed == false
      - result.response is defined
      - result.response.server_name == "test_update_server_name"
      - result.response.ip_address.ipv4.value == "192.168.1.200"
      - result.response.port == 515
      - result.response.network_protocol == "TCP"
      - result.response.modules | length == 3
      - result.response.modules[0].name == "ZOOKEEPER"
      - result.response.modules[0].log_severity_level == "CRITICAL"
      - result.response.modules[0].should_log_monitor_files == false
      - result.response.modules[1].name == "AUDIT"
      - result.response.modules[1].log_severity_level == "ALERT"
      - result.response.modules[1].should_log_monitor_files == true
      - result.response.modules[2].name == "CALM"
      - result.response.modules[2].log_severity_level == "WARNING"
      - result.response.modules[2].should_log_monitor_files == false
    success_msg: "Spec for updating RSYSLOG server using check mode with all
      attributes is generated successfully"
    fail_msg: "Spec for updating RSYSLOG server using check mode with all attributes
      is not generated successfully"

- name: Update RSYSLOG server
  nutanix.ncp.ntnx_rsyslog_servers_v2:
    cluster_ext_id: "{{ cluster.uuid }}"
    ext_id: "{{ todelete[0] }}"
    ip_address:
      ipv4:
        value: "192.168.1.211"
        prefix_length: 32
  register: result
  ignore_errors: true

- name: Debug result (update RSYSLOG)
  ansible.builtin.debug:
    var: result

- name: Update RSYSLOG server status
  ansible.builtin.assert:
    that:
      - result is defined
      - result.changed == true
      - result.failed == false
      - result.response is defined
      - result.response.server_name == "{{ rsyslog_name }}"
      - result.response.ip_address.ipv4.value == "192.168.1.211"
      - result.response.port == 514
      - result.response.network_protocol == "UDP"
    success_msg: "Update RSYSLOG server is successful"
    fail_msg: "Update RSYSLOG server failed"

- name: Update RSYSLOG server with all attributes
  nutanix.ncp.ntnx_rsyslog_servers_v2:
    cluster_ext_id: "{{ cluster.uuid }}"
    ext_id: "{{ todelete[1] }}"
    server_name: "{{ rsyslog_name }}_all"
    ip_address:
      ipv4:
        value: "192.168.1.201"
        prefix_length: 32
    port: 616
    network_protocol: "TCP"
    modules:
      - name: "FLOW"
        log_severity_level: "CRITICAL"
        should_log_monitor_files: false
      - name: "ACROPOLIS"
        log_severity_level: "ALERT"
        should_log_monitor_files: true
      - name: "LCM"
        log_severity_level: "WARNING"
        should_log_monitor_files: false
  register: result
  ignore_errors: true

- name: Debug result (update RSYSLOG with all attributes)
  ansible.builtin.debug:
    var: result

- name: Update RSYSLOG server with all attributes status
  ansible.builtin.assert:
    that:
      - result is defined
      - result.changed == true
      - result.failed == false
      - result.response is defined
      - result.response.server_name == "{{ rsyslog_name }}_all"
      - result.response.ip_address.ipv4.value == "192.168.1.201"
      - result.response.port == 616
      - result.response.network_protocol == "TCP"
      - result.response.modules | length == 3
      - result.response.modules[0].name == "FLOW"
      - result.response.modules[0].log_severity_level == "CRITICAL"
      - result.response.modules[0].should_log_monitor_files == false
      - result.response.modules[1].name == "ACROPOLIS"
      - result.response.modules[1].log_severity_level == "ALERT"
      - result.response.modules[1].should_log_monitor_files == true
      - result.response.modules[2].name == "LCM"
      - result.response.modules[2].log_severity_level == "WARNING"
      - result.response.modules[2].should_log_monitor_files == false
    success_msg: "Update RSYSLOG server with all attributes is successful"
    fail_msg: "Update RSYSLOG server with all attributes failed"

- name: Update RSYSLOG server with same values (idempotency test)
  nutanix.ncp.ntnx_rsyslog_servers_v2:
    cluster_ext_id: "{{ cluster.uuid }}"
    ext_id: "{{ todelete[1] }}"
    server_name: "{{ rsyslog_name }}_all"
    ip_address:
      ipv4:
        value: "192.168.1.201"
        prefix_length: 32
    port: 616
    network_protocol: "TCP"
    modules:
      - name: "FLOW"
        log_severity_level: "CRITICAL"
        should_log_monitor_files: false
      - name: "ACROPOLIS"
        log_severity_level: "ALERT"
        should_log_monitor_files: true
      - name: "LCM"
        log_severity_level: "WARNING"
        should_log_monitor_files: false
  register: result
  ignore_errors: true

- name: Debug result (update RSYSLOG idempotency)
  ansible.builtin.debug:
    var: result

- name: Update RSYSLOG server with same values to test idempotency status
  ansible.builtin.assert:
    that:
      - result is defined
      - result.changed == false
      - result.failed == false
      - result.msg == "Nothing to change."
    success_msg: "Update RSYSLOG server with same values to test idempotency passed"
    fail_msg: "Update RSYSLOG server with same values to test idempotency failed"

