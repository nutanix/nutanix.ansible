########################################################################################
# Delete RSYSLOG Server Tests
########################################################################################

- name: Delete RSYSLOG server with check mode
  nutanix.ncp.ntnx_rsyslog_servers_v2:
    state: absent
    cluster_ext_id: "{{ cluster.uuid }}"
    ext_id: "{{ todelete[0] }}"
  check_mode: true
  register: result
  ignore_errors: true

- name: Debug result (delete RSYSLOG check mode)
  ansible.builtin.debug:
    var: result

- name: Delete RSYSLOG server with check mode status
  ansible.builtin.assert:
    that:
      - result is defined
      - result.changed == false
      - result.failed == false
      - "'will be deleted' in result.msg"
    success_msg: "Delete RSYSLOG server with check mode passed"
    fail_msg: "Delete RSYSLOG server with check mode failed"

- name: Delete all created RSYSLOG servers
  nutanix.ncp.ntnx_rsyslog_servers_v2:
    state: absent
    cluster_ext_id: "{{ cluster.uuid }}"
    ext_id: "{{ item }}"
  register: result
  ignore_errors: true
  loop: "{{ todelete }}"

- name: Debug result (delete all RSYSLOG servers loop)
  ansible.builtin.debug:
    var: result

- name: Deletion Status
  ansible.builtin.assert:
    that:
      - result is defined
      - result.changed == true
      - result.results | length == todelete | length
      - result.msg == "All items completed"
      - result.results | length == todelete | length
      - item.ext_id in todelete
    fail_msg: "Unable to delete all RSYSLOG servers"
    success_msg: "All RSYSLOG servers are deleted successfully"
  loop: "{{ result.results }}"

- name: Delete RSYSLOG server with wrong external ID (should fail)
  nutanix.ncp.ntnx_rsyslog_servers_v2:
    state: absent
    cluster_ext_id: "{{ cluster.uuid }}"
    ext_id: "04595a7b-010c-4a89-58dd-060c94e9a1f0"
  register: result
  ignore_errors: true

- name: Debug result (delete wrong ext_id)
  ansible.builtin.debug:
    var: result

- name: Delete RSYSLOG server with wrong external ID status
  ansible.builtin.assert:
    that:
      - result is defined
      - result.changed == false
      - result.failed == true
    success_msg: "Delete RSYSLOG server with wrong external ID failed as expected"
    fail_msg: "Delete RSYSLOG server with wrong external ID did not fail as expected"

- name: Delete RSYSLOG server with missing external ID (should fail)
  nutanix.ncp.ntnx_rsyslog_servers_v2:
    state: absent
    cluster_ext_id: "{{ cluster.uuid }}"
  register: result
  ignore_errors: true

- name: Debug result (delete missing ext_id)
  ansible.builtin.debug:
    var: result

- name: Delete RSYSLOG server with missing external ID status
  ansible.builtin.assert:
    that:
      - result is defined
      - result.changed == false
      - result.failed == true
      - "'state is absent but all of the following are missing: ext_id' in
        result.msg"
    success_msg: "Delete RSYSLOG server with missing external ID failed as expected"
    fail_msg: "Delete RSYSLOG server with missing external ID did not fail as expected"
