---
############################################
# Setup - Create project for info tests
############################################

- name: Generate random name for info tests
  ansible.builtin.set_fact:
    info_project_name: "ansible-info-project-{{ 999999 | random }}"

- name: Create a project for info tests
  nutanix.ncp.ntnx_projects_v2:
    state: present
    wait: true
    name: "{{ info_project_name }}"
    project_id: "{{ info_project_name }}-id"
    description: "Project for info module testing"
  register: info_project_create

- name: Set project ext_id
  ansible.builtin.set_fact:
    info_project_ext_id: "{{ info_project_create.ext_id }}"

############################################
# Get project by ext_id
############################################

- name: Get project by ext_id
  nutanix.ncp.ntnx_projects_info_v2:
    ext_id: "{{ info_project_ext_id }}"
  register: get_result

- name: Verify get project by ext_id
  ansible.builtin.assert:
    that:
      - get_result is not changed
      - get_result.response is defined
      - get_result.response.name == info_project_name
      - get_result.ext_id == info_project_ext_id
    fail_msg: "Get project by ext_id failed"
    success_msg: "Get project by ext_id succeeded"

############################################
# List all projects
############################################

- name: List all projects
  nutanix.ncp.ntnx_projects_info_v2:
  register: list_result

- name: Verify list projects
  ansible.builtin.assert:
    that:
      - list_result is not changed
      - list_result.response is defined
      - list_result.response | length > 0
    fail_msg: "List projects failed"
    success_msg: "List projects succeeded"

############################################
# List with filter
############################################

- name: List projects with name filter
  nutanix.ncp.ntnx_projects_info_v2:
    filter: "name eq '{{ info_project_name }}'"
  register: filter_result

- name: Verify filtered list
  ansible.builtin.assert:
    that:
      - filter_result is not changed
      - filter_result.response is defined
      - filter_result.response | length == 1
      - filter_result.response[0].name == info_project_name
    fail_msg: "Filtered list projects failed"
    success_msg: "Filtered list projects succeeded"

############################################
# List with pagination
############################################

- name: List projects with limit
  nutanix.ncp.ntnx_projects_info_v2:
    limit: 1
  register: paginated_result

- name: Verify paginated list
  ansible.builtin.assert:
    that:
      - paginated_result is not changed
      - paginated_result.response is defined
      - paginated_result.response | length <= 1
    fail_msg: "Paginated list projects failed"
    success_msg: "Paginated list projects succeeded"

############################################
# Cleanup
############################################

- name: Delete project used for info tests
  nutanix.ncp.ntnx_projects_v2:
    state: absent
    wait: true
    ext_id: "{{ info_project_ext_id }}"
  register: cleanup_result

- name: Verify cleanup
  ansible.builtin.assert:
    that:
      - cleanup_result is changed
    fail_msg: "Cleanup failed"
    success_msg: "Cleanup succeeded"
