---
- name: Generate random suffix
  ansible.builtin.set_fact:
    random_name: "ansible-project-{{ 999999 | random }}"

- name: Create a project
  nutanix.ncp.ntnx_projects_v2:
    state: present
    wait: true
    name: "{{ random_name }}"
    project_id: "{{ random_name }}-id"
    description: "Test project created by Ansible integration tests"
  register: create_result

- name: Verify project creation
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.response is defined
      - create_result.response.name == random_name
      - create_result.ext_id is defined
    fail_msg: "Project creation failed"
    success_msg: "Project created successfully"

- name: Set project ext_id
  ansible.builtin.set_fact:
    project_ext_id: "{{ create_result.ext_id }}"

############################################
# Idempotency check - create same project
############################################

- name: Update project with no changes (idempotency)
  nutanix.ncp.ntnx_projects_v2:
    state: present
    wait: true
    ext_id: "{{ project_ext_id }}"
    name: "{{ random_name }}"
    description: "Test project created by Ansible integration tests"
  register: idempotent_result

- name: Verify idempotency
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
      - idempotent_result.skipped is defined
      - idempotent_result.skipped == true
    fail_msg: "Idempotency check failed - module reported changes when none were made"
    success_msg: "Idempotency check passed"

############################################
# Update project
############################################

- name: Update project name and description
  nutanix.ncp.ntnx_projects_v2:
    state: present
    wait: true
    ext_id: "{{ project_ext_id }}"
    name: "{{ random_name }}-updated"
    description: "Updated description"
  register: update_result

- name: Verify project update
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.response is defined
      - update_result.response.name == random_name + "-updated"
      - update_result.response.description == "Updated description"
    fail_msg: "Project update failed"
    success_msg: "Project updated successfully"

############################################
# Check mode - update
############################################

- name: Check mode - update project
  nutanix.ncp.ntnx_projects_v2:
    state: present
    ext_id: "{{ project_ext_id }}"
    name: "{{ random_name }}-check-mode"
  check_mode: true
  register: check_mode_result

- name: Verify check mode did not change anything
  ansible.builtin.assert:
    that:
      - check_mode_result.response is defined
      - check_mode_result.response.name == random_name + "-check-mode"
    fail_msg: "Check mode update test failed"
    success_msg: "Check mode update test passed"

- name: Verify check mode did not actually update
  nutanix.ncp.ntnx_projects_info_v2:
    ext_id: "{{ project_ext_id }}"
  register: verify_check_result

- name: Assert original name is preserved after check mode
  ansible.builtin.assert:
    that:
      - verify_check_result.response.name == random_name + "-updated"
    fail_msg: "Check mode incorrectly modified the project"
    success_msg: "Check mode correctly did not modify the project"

############################################
# Check mode - delete
############################################

- name: Check mode - delete project
  nutanix.ncp.ntnx_projects_v2:
    state: absent
    ext_id: "{{ project_ext_id }}"
  check_mode: true
  register: check_delete_result

- name: Verify check mode delete
  ansible.builtin.assert:
    that:
      - check_delete_result.msg is defined
    fail_msg: "Check mode delete test failed"
    success_msg: "Check mode delete test passed"

############################################
# Delete project
############################################

- name: Delete project
  nutanix.ncp.ntnx_projects_v2:
    state: absent
    wait: true
    ext_id: "{{ project_ext_id }}"
  register: delete_result

- name: Verify project deletion
  ansible.builtin.assert:
    that:
      - delete_result is changed
    fail_msg: "Project deletion failed"
    success_msg: "Project deleted successfully"

############################################
# Verify deletion
############################################

- name: Verify project no longer exists
  nutanix.ncp.ntnx_projects_info_v2:
    ext_id: "{{ project_ext_id }}"
  register: verify_delete_result
  ignore_errors: true

- name: Assert project not found
  ansible.builtin.assert:
    that:
      - verify_delete_result is failed
    fail_msg: "Project still exists after deletion"
    success_msg: "Project confirmed deleted"
