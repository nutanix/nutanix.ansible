    success_msg: "VM Guest Customization Profiles listed with filter successfully"

########################################################################################
# List with limit
########################################################################################
- name: List VM Guest Customization Profiles with limit
  nutanix.ncp.ntnx_vm_guest_customization_profiles_info_v2:
