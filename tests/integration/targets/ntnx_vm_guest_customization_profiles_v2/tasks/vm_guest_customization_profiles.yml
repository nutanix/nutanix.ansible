          sysprep_params:
            general_settings:
              computer_name:
                use_vm_name: {}
              timezone: "Eastern Standard Time"
              administrator_password: "admin12345"
              registered_owner: "admin Updated"
              registered_organization: "admin Updated"
            first_logon_commands:
