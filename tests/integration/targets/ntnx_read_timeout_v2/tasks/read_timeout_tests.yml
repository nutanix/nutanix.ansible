---
- name: Start read_timeout tests for all SDK clients
  ansible.builtin.debug:
    msg: "Start testing read_timeout parameter across all 13 SDK clients"

###########################################################
# 1. PRISM SDK (ntnx_prism_py_client) - categories_info
###########################################################
- name: "Prism SDK - List categories with default read_timeout (30000ms)"
  nutanix.ncp.ntnx_categories_info_v2:
    limit: 1
  register: result
  ignore_errors: true

- name: "Prism SDK - Verify default read_timeout works"
  ansible.builtin.assert:
    that:
      - result.changed == false
      - result.failed == false
      - result.response is defined
      - result.response | length == 1
      - result.total_available_results is defined
      - result.total_available_results > 0
      - result.response.0.key is defined
      - result.response.0.ext_id is defined
    fail_msg: "Prism SDK - list categories with default read_timeout failed"
    success_msg: "Prism SDK - default read_timeout (30000ms) passed"

- name: "Prism SDK - List categories with custom read_timeout (60000ms)"
  nutanix.ncp.ntnx_categories_info_v2:
    limit: 1
    read_timeout: 60000
  register: result_custom
  ignore_errors: true

- name: "Prism SDK - Verify custom read_timeout works"
  ansible.builtin.assert:
    that:
      - result_custom.changed == false
      - result_custom.failed == false
      - result_custom.response is defined
      - result_custom.response | length == 1
      - result_custom.total_available_results is defined
      - result_custom.total_available_results > 0
      - result_custom.response.0.key is defined
      - result_custom.response.0.ext_id is defined
    fail_msg: "Prism SDK - list categories with custom read_timeout (60000ms) failed"
    success_msg: "Prism SDK - custom read_timeout (60000ms) passed"

- name: "Prism SDK - Verify default and custom return same data"
  ansible.builtin.assert:
    that:
      - result.total_available_results == result_custom.total_available_results
    fail_msg: "Prism SDK - default and custom read_timeout returned different total_available_results"
    success_msg: "Prism SDK - default and custom read_timeout returned consistent data"

- name: "Prism SDK - List categories with very low read_timeout (1ms - negative test)"
  nutanix.ncp.ntnx_categories_info_v2:
    limit: 1
    read_timeout: 1
  register: result_timeout
  ignore_errors: true

- name: "Prism SDK - Verify low read_timeout causes ReadTimeoutError"
  ansible.builtin.assert:
    that:
      - result_timeout.changed == false
      - result_timeout.failed == true
      - "'Read timed out' in result_timeout.msg"
      - "'ReadTimeoutError' in result_timeout.msg"
      - "'read timeout=0.001' in result_timeout.msg"
    fail_msg: "Prism SDK - low read_timeout did not cause expected timeout (msg={{ result_timeout.msg | default('N/A') }})"
    success_msg: "Prism SDK - low read_timeout (1ms) correctly caused ReadTimeoutError"

