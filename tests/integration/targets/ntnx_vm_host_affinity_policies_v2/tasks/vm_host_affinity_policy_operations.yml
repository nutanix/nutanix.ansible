---
- name: Start testing ntnx_vm_host_affinity_policy_v2 and ntnx_vm_host_affinity_policies_info_v2
  ansible.builtin.debug:
    msg: Start testing VM Host Affinity Policy modules

- name: Generate random name
  ansible.builtin.set_fact:
    random_name: "{{ query('community.general.random_string', numbers=false, special=false, length=12)[0] }}"

- name: Set policy name prefix
  ansible.builtin.set_fact:
    policy_name: "{{ random_name }}_vm_host_affinity"

- name: List all categories and choose categories for testing
  nutanix.ncp.ntnx_categories_info_v2:
  register: result
  ignore_errors: true

- name: Verify categories are available
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == false
      - result.failed == false
      - result.response | length > 1
    fail_msg: "Unable to list categories"
    success_msg: "Categories listed successfully"

- name: Set variables
  ansible.builtin.set_fact:
    category_ext_id: '{{ result["response"][0]["ext_id"] }}'
    category_ext_id2: '{{ result["response"][1]["ext_id"] }}'
    category_ext_id3: '{{ result["response"][2]["ext_id"] }}'
    category_ext_id4: '{{ result["response"][3]["ext_id"] }}'

- name: Initialize delete list
  ansible.builtin.set_fact:
    todelete: []

##################################################################################
# Create - Check Mode
##################################################################################

- name: Create a VM-host affinity policy - check mode
  nutanix.ncp.ntnx_vm_host_affinity_policy_v2:
    state: present
    name: "{{ policy_name }}_1"
    description: "{{ policy_name }}_1_description"
    vm_categories:
      - ext_id: "{{ category_ext_id }}"
    host_categories:
      - ext_id: "{{ category_ext_id }}"
    wait: true
  register: result
  ignore_errors: true
  check_mode: true

- name: Verify create check mode
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == false
      - result.failed == false
      - result.response.name == "{{ policy_name }}_1"
      - result.response.description == "{{ policy_name }}_1_description"
      - result.response.vm_categories | length == 1
      - result.response.host_categories | length == 1
    fail_msg: "Create VM-host affinity policy check mode failed"
    success_msg: "Create VM-host affinity policy check mode passed"

##################################################################################
# Create - Minimal Spec
##################################################################################

- name: Create a VM-host affinity policy with minimal spec
  nutanix.ncp.ntnx_vm_host_affinity_policy_v2:
    state: present
    name: "{{ policy_name }}_2"
    vm_categories:
      - ext_id: "{{ category_ext_id }}"
    host_categories:
      - ext_id: "{{ category_ext_id }}"
    wait: true
  register: result
  ignore_errors: true

- name: Verify create with minimal spec
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == true
      - result.failed == false
      - result.response.name == "{{ policy_name }}_2"
      - result.response.vm_categories | length == 1
      - result.response.host_categories | length == 1
    fail_msg: "Create VM-host affinity policy with minimal spec failed"
    success_msg: "Create VM-host affinity policy with minimal spec passed"

- name: Add to delete list
  ansible.builtin.set_fact:
    todelete: '{{ todelete + [result["response"]["ext_id"]] }}'

##################################################################################
# Create - All Attributes
##################################################################################

- name: Create a VM-host affinity policy with all attributes
  nutanix.ncp.ntnx_vm_host_affinity_policy_v2:
    state: present
    name: "{{ policy_name }}_3"
    description: "{{ policy_name }}_3_description"
    vm_categories:
      - ext_id: "{{ category_ext_id2 }}"
    host_categories:
      - ext_id: "{{ category_ext_id2 }}"
    wait: true
  register: result
  ignore_errors: true

- name: Verify create with all attributes
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == true
      - result.failed == false
      - result.response.name == "{{ policy_name }}_3"
      - result.response.description == "{{ policy_name }}_3_description"
      - result.response.vm_categories | length == 1
      - result.response.host_categories | length == 1
    fail_msg: "Create VM-host affinity policy with all attributes failed"
    success_msg: "Create VM-host affinity policy with all attributes passed"

- name: Add to delete list
  ansible.builtin.set_fact:
    todelete: '{{ todelete + [result["response"]["ext_id"]] }}'

##################################################################################
# Update - Check Mode
##################################################################################

- name: Update a VM-host affinity policy - check mode
  nutanix.ncp.ntnx_vm_host_affinity_policy_v2:
    state: present
    ext_id: "{{ todelete[1] }}"
    name: "{{ policy_name }}_updated"
    description: "{{ policy_name }}_updated_description"
    vm_categories:
      - ext_id: "{{ category_ext_id3 }}"
    host_categories:
      - ext_id: "{{ category_ext_id3 }}"
    wait: true
  register: result
  ignore_errors: true
  check_mode: true

- name: Verify update check mode
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == false
      - result.failed == false
      - result.response.name == "{{ policy_name }}_updated"
      - result.response.description == "{{ policy_name }}_updated_description"
    fail_msg: "Update VM-host affinity policy check mode failed"
    success_msg: "Update VM-host affinity policy check mode passed"

##################################################################################
# Update - Actual
##################################################################################

- name: Update a VM-host affinity policy
  nutanix.ncp.ntnx_vm_host_affinity_policy_v2:
    state: present
    ext_id: "{{ todelete[1] }}"
    name: "{{ policy_name }}_updated"
    description: "{{ policy_name }}_updated_description"
    vm_categories:
      - ext_id: "{{ category_ext_id3 }}"
    host_categories:
      - ext_id: "{{ category_ext_id3 }}"
    wait: true
  register: result
  ignore_errors: true

- name: Verify update
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == true
      - result.failed == false
      - result.response.name == "{{ policy_name }}_updated"
      - result.response.description == "{{ policy_name }}_updated_description"
    fail_msg: "Update VM-host affinity policy failed"
    success_msg: "Update VM-host affinity policy passed"

##################################################################################
# Idempotency Check
##################################################################################

- name: Check idempotency - update with same values
  nutanix.ncp.ntnx_vm_host_affinity_policy_v2:
    state: present
    ext_id: "{{ todelete[1] }}"
    name: "{{ policy_name }}_updated"
    description: "{{ policy_name }}_updated_description"
    vm_categories:
      - ext_id: "{{ category_ext_id3 }}"
    host_categories:
      - ext_id: "{{ category_ext_id3 }}"
    wait: true
  register: result
  ignore_errors: true

- name: Verify idempotency
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == false
      - result.failed == false
      - result.msg == "Nothing to change."
      - result.ext_id == "{{ todelete[1] }}"
    fail_msg: "Idempotency check failed"
    success_msg: "Idempotency check passed"

##################################################################################
# Info - Get by ext_id
##################################################################################

- name: Get a VM-host affinity policy by ext_id
  nutanix.ncp.ntnx_vm_host_affinity_policies_info_v2:
    ext_id: "{{ todelete[0] }}"
  register: result
  ignore_errors: true

- name: Verify get by ext_id
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == false
      - result.failed == false
      - result.response.ext_id == "{{ todelete[0] }}"
    fail_msg: "Get VM-host affinity policy by ext_id failed"
    success_msg: "Get VM-host affinity policy by ext_id passed"

##################################################################################
# Info - List All
##################################################################################

- name: List all VM-host affinity policies
  nutanix.ncp.ntnx_vm_host_affinity_policies_info_v2:
  register: result
  ignore_errors: true

- name: Verify list all
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == false
      - result.failed == false
      - result.response | length > 0
      - result.total_available_results is defined
      - result.total_available_results > 0
    fail_msg: "List all VM-host affinity policies failed"
    success_msg: "List all VM-host affinity policies passed"

##################################################################################
# Info - List with filter
##################################################################################

- name: List VM-host affinity policies with name filter
  nutanix.ncp.ntnx_vm_host_affinity_policies_info_v2:
    filter: "name eq '{{ policy_name }}_updated'"
  register: result
  ignore_errors: true

- name: Verify filter result
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == false
      - result.failed == false
      - result.response[0].name == "{{ policy_name }}_updated"
    fail_msg: "List with filter failed"
    success_msg: "List with filter passed"

##################################################################################
# Info - List with limit
##################################################################################

- name: List VM-host affinity policies with limit 1
  nutanix.ncp.ntnx_vm_host_affinity_policies_info_v2:
    limit: 1
  register: result
  ignore_errors: true

- name: Verify list with limit
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == false
      - result.failed == false
      - result.response | length == 1
    fail_msg: "List with limit 1 failed"
    success_msg: "List with limit 1 passed"

##################################################################################
# Negative - Get non-existent policy
##################################################################################

- name: Get a non-existent VM-host affinity policy
  nutanix.ncp.ntnx_vm_host_affinity_policies_info_v2:
    ext_id: 12345678-1234-1234-1234-123456789012
  register: result
  ignore_errors: true

- name: Verify non-existent policy error
  ansible.builtin.assert:
    that:
      - result.failed == true
      - result.changed == false
    fail_msg: "Negative test for non-existent policy failed"
    success_msg: "Negative test for non-existent policy passed"

##################################################################################
# Negative - Update non-existent policy
##################################################################################

- name: Update a non-existent VM-host affinity policy
  nutanix.ncp.ntnx_vm_host_affinity_policy_v2:
    state: present
    ext_id: 12345678-1234-1234-1234-123456789012
    name: "nonexistent"
    vm_categories:
      - ext_id: "{{ category_ext_id }}"
    host_categories:
      - ext_id: "{{ category_ext_id }}"
    wait: true
  register: result
  ignore_errors: true

- name: Verify update non-existent error
  ansible.builtin.assert:
    that:
      - result.failed == true
      - result.changed == false
    fail_msg: "Negative test for update non-existent policy failed"
    success_msg: "Negative test for update non-existent policy passed"

##################################################################################
# Negative - Delete non-existent policy
##################################################################################

- name: Delete a non-existent VM-host affinity policy
  nutanix.ncp.ntnx_vm_host_affinity_policy_v2:
    state: absent
    ext_id: 12345678-1234-1234-1234-123456789012
  register: result
  ignore_errors: true

- name: Verify delete non-existent error
  ansible.builtin.assert:
    that:
      - result.failed == true
      - result.changed == false
    fail_msg: "Negative test for delete non-existent policy failed"
    success_msg: "Negative test for delete non-existent policy passed"

##################################################################################
# Delete - Check Mode
##################################################################################

- name: Delete VM-host affinity policy - check mode
  nutanix.ncp.ntnx_vm_host_affinity_policy_v2:
    state: absent
    ext_id: "{{ todelete[0] }}"
  register: result
  ignore_errors: true
  check_mode: true

- name: Verify delete check mode
  ansible.builtin.assert:
    that:
      - result.msg is defined
      - result.changed == false
      - result.failed == false
      - result.ext_id == "{{ todelete[0] }}"
      - result.msg == "Policy with ext_id:{{ todelete[0] }} will be deleted."
    fail_msg: "Delete VM-host affinity policy check mode failed"
    success_msg: "Delete VM-host affinity policy check mode passed"

##################################################################################
# Delete - Actual
##################################################################################

- name: Delete all created VM-host affinity policies
  nutanix.ncp.ntnx_vm_host_affinity_policy_v2:
    state: absent
    ext_id: "{{ item }}"
  register: result
  ignore_errors: true
  loop: "{{ todelete }}"

- name: Verify deletion
  ansible.builtin.assert:
    that:
      - item.response is defined
      - item.changed == true
      - item.failed == false
    fail_msg: "Delete VM-host affinity policies failed"
    success_msg: "Delete VM-host affinity policies passed"
  loop: "{{ result.results }}"
