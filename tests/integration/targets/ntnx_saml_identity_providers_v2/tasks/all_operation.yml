---
# Variables required before running this playbook:
# - xml_content

- name: Start ntnx_saml_identity_providers_v2 and ntnx_saml_identity_providers_info_v2 tests
  ansible.builtin.debug:
    msg: start ntnx_saml_identity_providers_v2 and ntnx_saml_identity_providers_info_v2 tests

- name: Generate random category  key & value
  ansible.builtin.set_fact:
    random_name: "{{ query('community.general.random_string', numbers=false, special=false, length=12)[0] }}"

- name: Set suffix name
  ansible.builtin.set_fact:
    suffix_name: ansible-ag

- name: Set variables
  ansible.builtin.set_fact:
    todelete: []
    user_name: "{{ random_name }}{{ suffix_name }}user"
    full_name: "{{ random_name }}{{ suffix_name }}saml"

- name: Verify spec generation for identity providers with check_mode
  nutanix.ncp.ntnx_saml_identity_providers_v2:
    name: "{{ full_name }}1"
    username_attribute: "{{ user_name }}1"
    email_attribute: email
    groups_attribute: groups
    groups_delim: ","
    idp_metadata_url: https://samltest.id/saml/idp
    idp_metadata_xml: idp_xml_value
    entity_issuer: entity_issuer_test
    is_signed_authn_req_enabled: true
    project_ext_id: "00000000-0000-0000-0000-000000000000"
    is_shared_with_all_projects: true
    custom_attributes:
      - custom1
      - custom2
    state: present
  register: result
  ignore_errors: true
  check_mode: true

- name: Creation Status
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == False
      - result.failed == False
      - result.response.name == "{{ full_name }}1"
      - result.response.username_attribute == "{{ user_name }}1"
      - result.response.email_attribute == "email"
      - result.response.groups_attribute == "groups"
      - result.response.groups_delim == ","
      - result.response.idp_metadata_url == "https://samltest.id/saml/idp"
      - result.response.idp_metadata_xml == "idp_xml_value"
      - result.response.entity_issuer == "entity_issuer_test"
      - result.response.is_signed_authn_req_enabled == true
      - result.response.project_ext_id == "00000000-0000-0000-0000-000000000000"
      - result.response.custom_attributes[0] == "custom1"
      - result.response.custom_attributes[1] == "custom2"
    fail_msg: " Unable to Verify spec generation for identity providers with check_mode "
    success_msg: " Verify spec generation for identity providers with check_mode finished successfully "

- name: Read content from file
  ansible.builtin.set_fact:
    xml_file_content: "{{ lookup('file', xml_content.dest + '/content.txt') }}"

- name: Create saml
  nutanix.ncp.ntnx_saml_identity_providers_v2:
    name: "{{ full_name }}1"
    username_attribute: "{{ user_name }}1"
    email_attribute: email
    groups_attribute: groups
    groups_delim: ","
    idp_metadata_xml: "{{ xml_file_content }}"
    project_ext_id: "00000000-0000-0000-0000-000000000000"
    is_shared_with_all_projects: true
    state: present
  register: result
  ignore_errors: true

- name: Creation Status
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == True
      - result.failed == False
      - result.response.name == "{{ full_name }}1"
      - result.response.username_attribute == "{{ user_name }}1"
      - result.response.email_attribute == "email"
      - result.response.groups_attribute == "groups"
      - result.response.groups_delim == ","
      - result.response.project_ext_id == "00000000-0000-0000-0000-000000000000"
      - result.response.shared_with_all_projects == true
    fail_msg: " Unable to create saml "
    success_msg: " saml created successfully "

- name: Adding saml external ID to delete list
  ansible.builtin.set_fact:
    todelete: '{{ todelete + [result["ext_id"]] }}'

- name: Get saml using filter name
  nutanix.ncp.ntnx_saml_identity_providers_info_v2:
    filter: name eq '{{ full_name }}1'
  register: result
  ignore_errors: true

- name: Status of saml
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == False
      - result.failed == False
      - result.response[0].name == "{{ full_name }}1"
      - result.response[0].username_attribute == "{{ user_name }}1"
      - result.response[0].email_attribute == "email"
      - result.response[0].groups_attribute == "groups"
      - result.response[0].groups_delim == ","
      - result.response[0].ext_id == "{{ todelete[-1] }}"
      - result.response | length == 1
    fail_msg: " Unable to fetch saml using filter name "
    success_msg: " saml fetched using filter name successfully "

- name: Verify spec generation for update identity providers with check_mode
  nutanix.ncp.ntnx_saml_identity_providers_v2:
    state: present
    ext_id: "{{ todelete[-1] }}"
    name: "{{ full_name }}2"
    username_attribute: "{{ user_name }}2"
    email_attribute: new_email
    groups_attribute: group_list
    groups_delim: ;
  register: result
  ignore_errors: true
  check_mode: true

- name: Update status
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == False
      - result.failed == False
      - result.response.name == "{{ full_name }}2"
      - result.response.username_attribute == "{{ user_name }}2"
      - result.response.email_attribute == "new_email"
      - result.response.groups_attribute == "group_list"
      - result.response.groups_delim == ";"
      - result.response.ext_id == "{{ todelete[-1] }}"
    fail_msg: " Unable to Verify spec generation for update identity providers with check_mode  "
    success_msg: " Verify spec generation for update identity providers with check_mode  finished successfully"

- name: Update saml
  nutanix.ncp.ntnx_saml_identity_providers_v2:
    state: present
    ext_id: "{{ todelete[-1] }}"
    name: "{{ full_name }}2"
    username_attribute: "{{ user_name }}2"
    email_attribute: new_email
    groups_attribute: group_list
    groups_delim: ;
  register: result
  ignore_errors: true

- name: Update status
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == True
      - result.failed == False
      - result.response.name == "{{ full_name }}2"
      - result.response.username_attribute == "{{ user_name }}2"
      - result.response.email_attribute == "new_email"
      - result.response.groups_attribute == "group_list"
      - result.response.groups_delim == ";"
      - result.response.ext_id == "{{ todelete[-1] }}"
    fail_msg: " Unable to update saml "
    success_msg: " saml updated successfully "

- name: Check idempotency
  nutanix.ncp.ntnx_saml_identity_providers_v2:
    state: present
    ext_id: "{{ todelete[-1] }}"
    name: "{{ full_name }}2"
    username_attribute: "{{ user_name }}2"
  register: result
  ignore_errors: true

- name: Idempotency status
  ansible.builtin.assert:
    that:
      - result.msg == "Nothing to change."
      - result.changed == False
      - result.failed == False
    fail_msg: " Unable to check idempotency "
    success_msg: " Idempotency check successfully "

- name: Get saml using ext_id
  nutanix.ncp.ntnx_saml_identity_providers_info_v2:
    ext_id: "{{ todelete[-1] }}"
  register: result
  ignore_errors: true

- name: Status of saml
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == False
      - result.failed == False
      - result.response.name == "{{ full_name }}2"
      - result.response.username_attribute == "{{ user_name }}2"
      - result.response.email_attribute == "new_email"
      - result.response.groups_attribute == "group_list"
      - result.response.groups_delim == ";"
      - result.response.ext_id == "{{ todelete[-1] }}"
    fail_msg: " Unable to fetch saml using ext_id "
    success_msg: " saml fetched using ext_id successfully "

- name: List all identity providers
  nutanix.ncp.ntnx_saml_identity_providers_info_v2:
  register: result
  ignore_errors: true

- name: List status
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == False
      - result.failed == False
      - result.response | length > 0
      - result.total_available_results is defined
      - result.total_available_results > 0
    fail_msg: " Unable to list all identity providers "
    success_msg: " list all identity providers successfully "

- name: Delete SAML identity provider with check mode enabled
  nutanix.ncp.ntnx_saml_identity_providers_v2:
    state: absent
    ext_id: "{{ todelete[0] }}"
  register: result
  ignore_errors: true
  check_mode: true

- name: Delete SAML identity provider with check mode status
  ansible.builtin.assert:
    that:
      - result.msg is defined
      - result.changed == false
      - result.failed == false
      - result.ext_id == "{{ todelete[0] }}"
      - result.msg == "Identity provider with ext_id:{{ todelete[0] }} will be deleted."
    fail_msg: " Delete SAML identity provider with check mode enabled failed "
    success_msg: " Delete SAML identity provider with check mode enabled successfully "

- name: Delete the created SAML identity providers
  nutanix.ncp.ntnx_saml_identity_providers_v2:
    state: absent
    ext_id: "{{ item }}"
  register: result
  loop: "{{ todelete }}"
  ignore_errors: true

- name: Deletion Status
  ansible.builtin.assert:
    that:
      - result.changed == True
      - result.msg == "All items completed"
      - result.skipped == False
    fail_msg: " Unable to delete saml "
    success_msg: " saml deleted successfully "

- name: Reset todelete list
  ansible.builtin.set_fact:
    todelete: []

########################################################################
# Tests for is_shared_with_all_projects and shared_with_projects
########################################################################

- name: Create SAML identity provider for sharing tests
  nutanix.ncp.ntnx_saml_identity_providers_v2:
    name: "{{ full_name }}_shared"
    username_attribute: "{{ user_name }}_shared"
    email_attribute: email
    groups_attribute: groups
    groups_delim: ","
    idp_metadata_xml: "{{ xml_file_content }}"
    project_ext_id: "00000000-0000-0000-0000-000000000000"
    state: present
  register: result
  ignore_errors: true

- name: Status of create SAML for sharing tests
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == true
      - result.failed == false
      - result.ext_id is defined
      - result.response.project_ext_id == "00000000-0000-0000-0000-000000000000"
      - result.response.shared_with_all_projects == false
    fail_msg: "Create SAML for sharing tests failed"
    success_msg: "Created SAML for sharing tests"

- name: Set shared SAML ext_id
  ansible.builtin.set_fact:
    shared_saml_ext_id: "{{ result.ext_id }}"

########################################################################

- name: Update SAML to share with all projects
  nutanix.ncp.ntnx_saml_identity_providers_v2:
    state: present
    ext_id: "{{ shared_saml_ext_id }}"
    is_shared_with_all_projects: true
  register: result
  ignore_errors: true

- name: Status of SAML share with all projects
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == true
      - result.failed == false
      - result.response.shared_with_all_projects == true
    fail_msg: "SAML share with all projects failed"
    success_msg: "SAML shared with all projects successfully"

########################################################################

- name: Update SAML to unshare from all projects
  nutanix.ncp.ntnx_saml_identity_providers_v2:
    state: present
    ext_id: "{{ shared_saml_ext_id }}"
    is_shared_with_all_projects: false
  register: result
  ignore_errors: true

- name: Status of SAML unshare from all projects
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == true
      - result.failed == false
      - result.response.shared_with_all_projects == false
    fail_msg: "SAML unshare from all projects failed"
    success_msg: "SAML unshared from all projects successfully"

########################################################################

- name: Update SAML to share with specific projects
  nutanix.ncp.ntnx_saml_identity_providers_v2:
    state: present
    ext_id: "{{ shared_saml_ext_id }}"
    shared_with_projects:
      - "{{ project.uuid }}"
  register: result
  ignore_errors: true
  when: project is defined and project.uuid is defined

- name: Status of SAML share with specific projects
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == true
      - result.failed == false
      - result.response.shared_with_projects is defined
      - project.uuid in result.response.shared_with_projects
    fail_msg: "SAML share with specific projects failed"
    success_msg: "SAML shared with specific projects successfully"
  when: project is defined and project.uuid is defined

########################################################################

- name: Update SAML to unshare from specific projects
  nutanix.ncp.ntnx_saml_identity_providers_v2:
    state: present
    ext_id: "{{ shared_saml_ext_id }}"
    shared_with_projects: []
  register: result
  ignore_errors: true
  when: project is defined and project.uuid is defined

- name: Status of SAML unshare from specific projects
  ansible.builtin.assert:
    that:
      - result.failed == false
    fail_msg: "SAML unshare from specific projects failed with error"
    success_msg: "SAML unshare from specific projects completed"
  when: project is defined and project.uuid is defined

########################################################################

- name: Delete shared SAML identity provider
  nutanix.ncp.ntnx_saml_identity_providers_v2:
    state: absent
    ext_id: "{{ shared_saml_ext_id }}"
  register: result
  ignore_errors: true

- name: Delete shared SAML status
  ansible.builtin.assert:
    that:
      - result.changed == true
      - result.failed == false
      - result.ext_id == "{{ shared_saml_ext_id }}"
    fail_msg: "Unable to delete shared SAML identity provider"
    success_msg: "Shared SAML identity provider deleted successfully"
