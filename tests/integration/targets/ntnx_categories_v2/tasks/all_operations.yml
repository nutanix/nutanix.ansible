---
- name: Start ntnx_categories_v2 tests
  ansible.builtin.debug:
    msg: Start ntnx_categories_v2 tests

- name: Generate random category  key & value
  ansible.builtin.set_fact:
    random_name: "{{query('community.general.random_string',numbers=false, special=false,length=12)[0]}}"

- name: Set suffix name
  ansible.builtin.set_fact:
    suffix_name: "ansible-ag"

- name: Set category key & value
  ansible.builtin.set_fact:
    todelete: []
    key1: "{{random_name}}{{suffix_name}}key1"
    value1: "{{random_name}}{{suffix_name}}value1"
    value2: "{{random_name}}{{suffix_name}}value2"
########################################################################
- name: Create category key & value with check_mode
  nutanix.ncp.ntnx_categories_v2:
    key: "{{key1}}"
    value: "{{value1}}"
    description: "ansible test"
    project_ext_id: "{{ project.uuid | default(omit) }}"
    shared_with_projects: "{{ [project.uuid] if project is defined and project.uuid is defined else omit }}"
  register: result
  ignore_errors: true
  check_mode: true

- name: Check mode status
  ansible.builtin.assert:
    that:
      - result.changed == False
      - result.failed == False
      - result.response.key == "{{key1}}"
      - result.response.value == "{{value1}}"
      - result.response.description == "ansible test"
      - result.response.project_ext_id == project.uuid
    fail_msg: "Check mode failed"
    success_msg: "Check mode passed"
########################################################################
- name: Create category key & value
  nutanix.ncp.ntnx_categories_v2:
    key: "{{key1}}"
    value: "{{value1}}"
    description: "ansible test"
    project_ext_id: "{{ project.uuid | default(omit) }}"
    shared_with_projects: "{{ [project.uuid] if project is defined and project.uuid is defined else omit }}"
  register: output
  ignore_errors: true

- name: Creation Status
  ansible.builtin.assert:
    that:
      - output.response is defined
      - output.response.key == "{{key1}}"
      - output.response.value == "{{value1}}"
      - output.response.type == "USER"
      - output.response.ext_id is defined
      - output.changed == True
      - output.failed == False
      - output.response.description == "ansible test"
      - output.response.project_ext_id == project.uuid
    fail_msg: "Unable to create category key & value"
    success_msg: "Category key & value created successfully"

- name: Add category to delete list
  ansible.builtin.set_fact:
    todelete: '{{ todelete + [  output["response"]["ext_id"] ] }}'
########################################################################
- name: Update category value and description
  nutanix.ncp.ntnx_categories_v2:
    ext_id: "{{output.response.ext_id}}"
    key: "{{key1}}"
    value: "{{value2}}"
    description: "ansible test New value"
  register: result
  ignore_errors: true

- name: Update status
  ansible.builtin.assert:
    that:
      - result.changed == True
      - result.failed == False
      - result.response.type == "USER"
      - result.response.key == "{{key1}}"
      - result.response.value == "{{value2}}"
      - result.response.description == "ansible test New value"
    fail_msg: "Unable to update category key & value"
    success_msg: "Category description & value updated successfully"
########################################################################
- name: Check idempotency
  nutanix.ncp.ntnx_categories_v2:
    ext_id: "{{output.response.ext_id}}"
    key: "{{key1}}"
    value: "{{value2}}"
    description: "ansible test New value"
  register: result
  ignore_errors: true

- name: Idempotency status
  ansible.builtin.assert:
    that:
      - result.changed == False
      - result.failed == False
      - result.skipped == True
      - result.msg == "Nothing to change."
    fail_msg: "Idempotency failed"
    success_msg: "Idempotency passed"
########################################################################
- name: Update category value and description with check_mode
  nutanix.ncp.ntnx_categories_v2:
    ext_id: "{{output.response.ext_id}}"
    key: "{{key1}}"
    value: "new value"
    description: "ansible test New value"
  register: result
  ignore_errors: true
  check_mode: true

- name: Check mode status
  ansible.builtin.assert:
    that:
      - result.changed == False
      - result.failed == False
      - result.response.key == "{{key1}}"
      - result.response.value == "new value"
      - result.response.description == "ansible test New value"
    fail_msg: "Check mode failed"
    success_msg: "Check mode passed"
########################################################################
- name: List all categories
  nutanix.ncp.ntnx_categories_info_v2:
  register: result
  ignore_errors: true

- name: Status of all categories
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == False
      - result.failed == False
      - result.response | length > 0
      - result.total_available_results is defined
      - result.total_available_results > 0
    fail_msg: "Unable to list categories "
    success_msg: "categories  listed successfully"

- name: Set category name
  ansible.builtin.set_fact:
    category_name: "{{result.response.0.key}}"

########################################################################
- name: List all categories with keyname & expand associations
  nutanix.ncp.ntnx_categories_info_v2:
    expand: associations
    filter: "key eq '{{category_name}}'"
  register: result
  ignore_errors: true

- name: Status of all categories
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == False
      - result.failed == False
      - result.response | length > 0
      - result.response.0.associations is defined
    fail_msg: "Unable to List all categories with keyname & expand associations "
    success_msg: "categories with keyname & expand  listed successfully"
########################################################################
- name: Fetch category using ext id & expand detailedAssociations
  nutanix.ncp.ntnx_categories_info_v2:
    ext_id: "{{result.response.0.ext_id}}"
    expand: detailedAssociations
  register: result
  ignore_errors: true

- name: Status of category
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == False
      - result.failed == False
      - result.response.key == "{{category_name}}"
    fail_msg: "Unable to fetch category using ext id & expand detailedAssociations"
    success_msg: "category fetched using ext id & expand detailedAssociations successfully"
########################################################################

- name: Delete category with check mode enabled
  nutanix.ncp.ntnx_categories_v2:
    ext_id: "{{todelete[0]}}"
    state: absent
  register: result
  ignore_errors: true
  check_mode: true

- name: Delete category with check mode status
  ansible.builtin.assert:
    that:
      - result.msg is defined
      - result.changed == false
      - result.failed == false
      - result.ext_id == "{{ todelete[0] }}"
      - result.msg == "Category with ext_id:{{ todelete[0] }} will be deleted."
    fail_msg: "Delete category with check mode failed"
    success_msg: "Delete category with check mode passed"

########################################################################

- name: Delete Created categories
  nutanix.ncp.ntnx_categories_v2:
    ext_id: "{{item}}"
    state: absent
  register: result
  loop: "{{ todelete }}"
  ignore_errors: true

- name: Deletion Status
  ansible.builtin.assert:
    that:
      - result.changed == True
      - result.msg == "All items completed"
    fail_msg: "Unable to delete category key & value"
    success_msg: "Category key & value deleted successfully"

- name: Reset todelete list
  ansible.builtin.set_fact:
    todelete: []

########################################################################
# Tests for shared_with_projects
########################################################################

- name: Create category for sharing tests
  nutanix.ncp.ntnx_categories_v2:
    key: "{{ key1 }}_shared"
    value: "{{ value1 }}_shared"
    description: "ansible shared test"
    project_ext_id: "{{ project.uuid | default(omit) }}"
  register: result
  ignore_errors: true

- name: Status of create for sharing tests
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == true
      - result.failed == false
      - result.ext_id is defined
      - result.response.project_ext_id == project.uuid
    fail_msg: "Create category for sharing tests failed"
    success_msg: "Created category for sharing tests"

- name: Set shared category ext_id
  ansible.builtin.set_fact:
    shared_category_ext_id: "{{ result.ext_id }}"

########################################################################

- name: Update category to share with specific projects
  nutanix.ncp.ntnx_categories_v2:
    state: present
    ext_id: "{{ shared_category_ext_id }}"
    shared_with_projects:
      - "{{ project.uuid }}"
  register: result
  ignore_errors: true
  when: project is defined and project.uuid is defined

- name: Status of share with specific projects
  ansible.builtin.assert:
    that:
      - result.response is defined
      - result.changed == true
      - result.failed == false
    fail_msg: "Share with specific projects failed"
    success_msg: "Shared with specific projects successfully"
  when: project is defined and project.uuid is defined

########################################################################

- name: Update category to unshare from specific projects
  nutanix.ncp.ntnx_categories_v2:
    state: present
    ext_id: "{{ shared_category_ext_id }}"
    shared_with_projects: []
  register: result
  ignore_errors: true
  when: project is defined and project.uuid is defined

- name: Status of unshare from specific projects
  ansible.builtin.assert:
    that:
      - result.failed == false
    fail_msg: "Unshare from specific projects failed with error"
    success_msg: "Unshare from specific projects completed"
  when: project is defined and project.uuid is defined

########################################################################

- name: Delete shared category
  nutanix.ncp.ntnx_categories_v2:
    state: absent
    ext_id: "{{ shared_category_ext_id }}"
  register: result
  ignore_errors: true

- name: Delete shared category status
  ansible.builtin.assert:
    that:
      - result.changed == true
      - result.failed == false
      - result.ext_id == "{{ shared_category_ext_id }}"
    fail_msg: "Unable to delete shared category"
    success_msg: "Shared category deleted successfully"
