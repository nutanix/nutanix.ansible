# nutanix_hostname: "hostname"
# nutanix_username: "username"
# nutanix_password: "password"
# validate_certs: false
fetch_all_vms: true
filters:
  - "name == 'hostname_v1_test_no_desc'"
strict: true
hostnames:
  - nonexistent_field
