##################################################
# Cleanup
##################################################

- name: "Cleanup: Delete all created SNMP traps"
  nutanix.ncp.ntnx_snmp_trap_v2:
    cluster_ext_id: "{{ cluster_ext_id }}"
    state: absent
    ext_id: "{{ item }}"
  register: delete_traps_result
  loop: "{{ to_delete_traps }}"
  ignore_errors: true

- name: Debug traps deletion results
  ansible.builtin.debug:
    var: delete_traps_result

- name: Verify traps deletion status
  ansible.builtin.assert:
    that:
      - item.changed == true
      - item.failed == false
      - item.response.status == 'SUCCEEDED'
      - item.response is defined
      - item.ext_id in to_delete_traps
      - delete_traps_result.changed == true
      - delete_traps_result.msg == "All items completed"
      - delete_traps_result.results | length == to_delete_traps | length
    fail_msg: "Failed to delete all SNMP traps"
    success_msg: "All SNMP traps are deleted"
  loop: "{{ delete_traps_result.results }}"
  when: to_delete_traps | length > 0

- name: "Cleanup: Delete all created SNMP users"
  nutanix.ncp.ntnx_snmp_user_v2:
    cluster_ext_id: "{{ cluster_ext_id }}"
    state: absent
    ext_id: "{{ item }}"
  register: delete_users_result
  loop: "{{ to_delete_users }}"
  ignore_errors: true

- name: Debug users deletion results
  ansible.builtin.debug:
    var: delete_users_result

- name: Verify users deletion status
  ansible.builtin.assert:
    that:
      - item.changed == true
      - item.failed == false
      - item.response.status == 'SUCCEEDED'
      - item.response is defined
      - item.ext_id in to_delete_users
      - delete_users_result.changed == true
      - delete_users_result.msg == "All items completed"
      - delete_users_result.results | length == to_delete_users | length
    fail_msg: "Failed to delete all SNMP users"
    success_msg: "All SNMP users are deleted"
  loop: "{{ delete_users_result.results }}"
  when: to_delete_users | length > 0
